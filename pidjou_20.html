<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Pidjou</title>
<style>
html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; }
*, *::before, *::after { -webkit-tap-highlight-color: transparent; }
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

#pidjou-root, #pidjou-root * { box-sizing: border-box; }
#pidjou-root {
  --felt-dark: #052e14;
  --felt: #0a5c28;
  --felt-light: #0f7d36;
  --flag-blue: #002674;
  --flag-blue-light: #2350a8;
  --ink: #051339;
  --parchment: #f2ecc9;
  --parchment-dim: #e6dba0;
  --brass: #fcd022;
  --brass-bright: #ffe066;
  --rust: #a6432e;
  --text-light: #f5f0da;
  --text-dim: #b8c9bb;
  font-family: 'Inter', sans-serif;
  color: var(--text-light);
  background: radial-gradient(ellipse at top, var(--felt-light), var(--felt-dark) 70%);
  min-height: 100vh;
  width: 100%;
  max-width: 100vw;
  padding: 0;
  position: relative;
  overflow-x: hidden;
}
#pidjou-root .disp { font-family: 'Fraunces', serif; }
#pidjou-root .mono { font-family: 'Space Mono', monospace; }

#pidjou-root button {
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  border: none;
  border-radius: 8px;
  transition: transform .12s ease, filter .12s ease, opacity .12s ease;
}
#pidjou-root button:active { transform: translateY(1px); }
#pidjou-root button:disabled { opacity: .35; cursor: not-allowed; transform: none; }
#pidjou-root button.btn-primary {
  background: linear-gradient(180deg, var(--brass-bright), var(--brass));
  color: #2a1c05;
  font-weight: 700;
  padding: 12px 22px;
  font-size: 15px;
  box-shadow: 0 2px 0 #8a6825, 0 6px 14px rgba(0,0,0,.35);
}
#pidjou-root button.btn-primary:hover:not(:disabled) { filter: brightness(1.06); }
#pidjou-root button.btn-ghost {
  background: transparent;
  color: var(--text-light);
  border: 1px solid rgba(242,232,208,.35);
  padding: 10px 18px;
  font-size: 14px;
}
#pidjou-root button.btn-ghost:hover:not(:disabled) { background: rgba(242,232,208,.08); }
#pidjou-root button.btn-small {
  padding: 7px 12px;
  font-size: 13px;
  background: rgba(242,232,208,.12);
  color: var(--text-light);
  border: 1px solid rgba(242,232,208,.25);
}
#pidjou-root button.btn-small:hover:not(:disabled) { background: rgba(242,232,208,.2); }
#pidjou-root button.lang-btn {
  padding: 6px 10px;
  font-size: 12px;
  background: rgba(242,232,208,.08);
  color: var(--text-dim);
  border: 1px solid rgba(242,232,208,.2);
  font-family: 'Space Mono', monospace;
  letter-spacing: .5px;
}
#pidjou-root button.lang-btn.active {
  background: var(--brass);
  color: #2a1c05;
  border-color: var(--brass);
  font-weight: 700;
}
#pidjou-root button.bid-btn {
  background: var(--parchment);
  color: var(--ink);
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 17px;
  width: 44px; height: 44px;
  border-radius: 50%;
  box-shadow: 0 3px 0 #a89568;
}
#pidjou-root button.bid-btn:hover:not(:disabled) { filter: brightness(1.05); }
#pidjou-root input[type=text] {
  font-family: 'Space Mono', monospace;
  background: rgba(242,232,208,.1);
  border: 1px solid rgba(242,232,208,.35);
  color: var(--text-light);
  padding: 11px 14px;
  border-radius: 8px;
  font-size: 15px;
  letter-spacing: 1px;
  width: 100%;
}
#pidjou-root input[type=text]::placeholder { color: rgba(242,232,208,.4); }
#pidjou-root input[type=text]:focus, #pidjou-root button:focus-visible {
  outline: 2px solid var(--brass-bright);
  outline-offset: 2px;
}

.pj-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid rgba(0,38,116,.5);
  background: linear-gradient(180deg, rgba(0,38,116,.35), rgba(0,0,0,.15));
  gap: 10px; flex-wrap: wrap;
}
.pj-brand { font-family: 'Fraunces', serif; font-weight: 700; font-size: 20px; letter-spacing: .5px; color: var(--brass-bright); }
.pj-brand span { color: var(--text-dim); font-family: 'Inter'; font-weight: 500; font-size: 12px; display:block; letter-spacing: 1.5px; text-transform: uppercase; margin-top: -2px;}
.pj-help-btn {
  width: 30px; height: 30px; border-radius: 50%; padding: 0;
  font-family: 'Fraunces', serif; font-weight: 700; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.pj-room-chip {
  font-family: 'Space Mono', monospace;
  background: rgba(35,80,168,.15);
  border: 1px dashed var(--flag-blue-light);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 14px;
  letter-spacing: 3px;
  cursor: pointer;
}
.pj-lang-toggle { display: flex; gap: 4px; align-items: center; }
.flag-btn {
  padding: 0; width: 30px; height: 22px;
  background: transparent; border: 1px solid rgba(242,232,208,.25);
  border-radius: 4px; overflow: hidden; display: flex; align-items: center; justify-content: center;
  margin-right: 2px;
}
.flag-btn:hover { border-color: var(--brass-bright); transform: scale(1.05); }
.flag-btn { position: relative; }
.flag-btn-playing { border-color: var(--brass-bright); box-shadow: 0 0 0 2px rgba(255,224,102,.4); }
.flag-btn-stop {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.55); color: var(--brass-bright); font-size: 10px;
}

.pj-center { max-width: 560px; margin: 0 auto; padding: 18px 20px 48px; }
.pj-home-hero { text-align: center; margin-bottom: 34px; }
.pj-home-hero h1 { font-size: 46px; margin: 0 0 6px; letter-spacing: .5px; }
.pj-home-hero p { color: var(--text-dim); font-size: 15px; line-height: 1.5; max-width: 380px; margin: 0 auto; }
.pj-card-suit-row { font-size: 22px; letter-spacing: 10px; margin: 0 0 16px; opacity: .8; }

.pj-panel {
  background: rgba(0,0,0,.2);
  border: 1px solid rgba(242,232,208,.14);
  border-radius: 14px;
  padding: 22px;
  margin-bottom: 16px;
}
.pj-panel h3 { font-family: 'Fraunces', serif; margin: 0 0 14px; font-size: 17px; font-weight: 600; color: var(--brass-bright); }
.pj-field-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-dim); margin-bottom: 6px; display: block; }
.pj-row { display: flex; gap: 10px; }
.pj-row > * { flex: 1; }
.pj-select {
  font-family: 'Inter', sans-serif;
  background: rgba(242,232,208,.1);
  border: 1px solid rgba(242,232,208,.35);
  color: var(--text-light);
  padding: 11px 14px;
  border-radius: 8px;
  font-size: 15px;
  width: 100%;
}
.pj-select option { background: var(--felt-dark); color: var(--text-light); }
.pj-divider-word {
  text-align: center; color: var(--text-dim); font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  margin: 26px 0; position: relative;
}
.pj-divider-word:before, .pj-divider-word:after {
  content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: rgba(242,232,208,.15);
}
.pj-divider-word:before { left: 0; } .pj-divider-word:after { right: 0; }
.pj-mode-heading {
  font-family: 'Fraunces', serif; font-size: 13px; text-transform: uppercase; letter-spacing: 2px;
  color: var(--brass-bright); text-align: center; margin: 8px 0 14px;
}
.pj-mode-divider { height: 2px; background: linear-gradient(90deg, transparent, var(--flag-blue-light), transparent); margin: 38px 0 22px; }

.pj-lobby-code { text-align: center; margin: 6px 0 26px; }
.pj-lobby-code .code { font-family: 'Space Mono', monospace; font-size: 40px; letter-spacing: 12px; color: var(--brass-bright); font-weight: 700; }
.pj-lobby-code .hint { color: var(--text-dim); font-size: 13px; margin-top: 6px; }
.pj-seat-list { list-style: none; margin: 0; padding: 0; }
.pj-seat-list li {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 4px; border-bottom: 1px solid rgba(242,232,208,.08);
  font-size: 15px;
}
.pj-seat-list li:last-child { border-bottom: none; }
.pj-seat-num {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--felt-light); border: 1px solid var(--brass);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-family: 'Space Mono'; color: var(--brass-bright);
  flex-shrink: 0;
}
.pj-seat-empty { color: var(--text-dim); font-style: italic; font-size: 14px; }
.pj-seat-avatar {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: var(--felt-light); border: 1px solid var(--brass);
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.pj-seat-avatar-pickable { cursor: pointer; border-color: var(--brass-bright); }
.pj-avatar-picker {
  display: flex !important; flex-wrap: wrap; gap: 8px; padding: 10px 4px 4px 34px !important;
  border-bottom: none !important;
}
.pj-avatar-option {
  width: 34px; height: 34px; border-radius: 50%; font-size: 17px;
  background: rgba(242,232,208,.07); border: 1px solid rgba(242,232,208,.18);
  display: flex; align-items: center; justify-content: center;
}
.pj-avatar-option.selected { background: var(--brass); border-color: var(--brass); }
.pj-bot-tag {
  display: inline-flex; align-items: center; gap: 3px;
  background: rgba(35,80,168,.2); border: 1px solid var(--flag-blue-light);
  color: var(--text-light); font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 4px;
}
.pj-bot-remove { color: var(--rust); cursor: pointer; margin-left: 8px; font-size: 13px; text-decoration: none; }
.pj-seat-addbot { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.pj-add-bot-label { color: var(--text-dim); font-size: 13px; font-style: italic; }
.pj-add-bot-btns { display: flex; gap: 6px; margin-left: auto; }
.pj-add-bot-btns button { font-size: 11px; padding: 5px 9px; }

.pj-table-wrap { max-width: 780px; margin: 0 auto; padding: 16px 14px 90px; }
.pj-players-strip { display: flex; gap: 8px; overflow-x: auto; padding: 4px 2px 14px; flex: 1 1 auto; min-width: 0; }
.pj-top-row { display: flex; align-items: flex-start; gap: 8px; }
.pj-target-line {
  text-align: center; font-size: 11px; color: var(--text-dim); letter-spacing: .5px;
  padding: 2px 0 8px; text-transform: uppercase;
}
.pj-trump-corner {
  flex: 0 0 auto; margin-top: 4px;
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(0,0,0,.3); border: 1px solid var(--brass);
  padding: 6px 12px; border-radius: 20px; font-size: 12.5px; color: var(--brass-bright);
  white-space: nowrap;
}
.pj-trump-corner-pending { border-color: rgba(242,232,208,.3); color: var(--text-dim); }
.pj-player-chip {
  flex: 0 0 auto;
  background: rgba(0,0,0,.22); border: 1px solid rgba(242,232,208,.15);
  border-radius: 10px; padding: 8px 12px; min-width: 92px;
  text-align: center; position: relative;
}
.pj-player-chip.is-turn { border-color: var(--brass-bright); box-shadow: 0 0 0 1px var(--brass-bright), 0 0 14px rgba(201,154,62,.35); }
.pj-player-chip.is-me { background: rgba(201,154,62,.12); }
.pj-player-chip .chip-avatar { font-size: 20px; line-height: 1; margin-bottom: 2px; }
.pj-player-chip .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }
.pj-player-chip .meta { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
.pj-player-chip .score { font-size: 11px; color: var(--brass-bright); margin-top: 2px; font-family: 'Space Mono', monospace; font-weight: 700; display: inline-block; }
.pj-player-chip .score.pulse { animation: scorePulse .7s ease; }
@keyframes scorePulse {
  0% { transform: scale(1); }
  35% { transform: scale(1.5); color: #7fbf7f; }
  100% { transform: scale(1); }
}
.pj-player-chip .tag { position: absolute; top: -8px; right: 6px; font-size: 9px; background: var(--brass); color: #2a1c05; padding: 1px 6px; border-radius: 8px; font-weight: 700; letter-spacing: .5px; }

.pj-felt {
  background: radial-gradient(ellipse at center, var(--felt-light), var(--felt) 75%);
  border: 6px solid #0a1e15;
  border-radius: 18px;
  box-shadow: inset 0 0 40px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
  padding: 26px 16px;
  min-height: 190px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px;
  margin-bottom: 16px;
}
.pj-trick-area { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; min-height: 78px; align-items: center;}
.pj-trick-card { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.pj-trick-card .who { font-size: 10px; color: var(--text-dim); letter-spacing: .5px; }
.pj-trick-card-winner .pj-card { box-shadow: 0 3px 6px rgba(0,0,0,.4), 0 0 0 2px var(--brass-bright); }
.pj-trick-card-winner .who { color: var(--brass-bright); font-weight: 700; }
.pj-status-line { font-family: 'Fraunces', serif; font-size: 16px; text-align: center; color: var(--parchment); }
.pj-status-line.mine { color: var(--brass-bright); font-weight: 700; }
.pj-trump-announce {
  font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; text-align: center;
  color: var(--brass-bright); padding: 18px 10px 6px;
  text-shadow: 0 2px 6px rgba(0,0,0,.4);
}
.pj-exchange-summary {
  text-align: center; font-size: 12.5px; color: var(--text-light); opacity: .85;
  padding-bottom: 10px; line-height: 1.7;
}
.pj-my-exchange { padding: 6px 8px 10px; }
.pj-my-exchange-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.pj-my-exchange-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; width: 62px; flex-shrink: 0; text-align: right; }
.pj-my-exchange-cards { display: flex; gap: 4px; flex-wrap: wrap; min-height: 30px; align-items: center; }
.pj-discarded-cards .pj-card { opacity: .35; filter: grayscale(1); }
.pj-last-trick {
  font-size: 12.5px; color: var(--text-dim); text-align: center;
  background: rgba(0,0,0,.22); border: 1px solid rgba(242,232,208,.15);
  padding: 10px 14px; border-radius: 12px; max-width: 100%;
}
.pj-last-trick b { color: var(--brass-bright); }
.pj-last-trick-label { text-transform: uppercase; letter-spacing: .5px; font-size: 10px; opacity: .7; margin-bottom: 4px; }
.pj-trump-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(0,0,0,.3); border: 1px solid var(--brass);
  padding: 4px 12px; border-radius: 20px; font-size: 13px; color: var(--brass-bright);
}

.pj-card {
  width: 54px; height: 76px;
  background: var(--parchment);
  border-radius: 7px;
  box-shadow: 0 3px 6px rgba(0,0,0,.4);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: 'Fraunces', serif; font-weight: 700; font-size: 19px;
  color: var(--ink); position: relative; flex-shrink: 0;
}
.pj-card.red { color: var(--rust); }
.pj-card .suit { font-size: 20px; margin-top: 2px; }
.pj-card.mini { width: 40px; height: 56px; font-size: 14px; }
.pj-card.mini .suit { font-size: 14px; }
.pj-card.playable { cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,.4), 0 0 0 2px var(--brass-bright); }
.pj-card.playable:hover { transform: translateY(-6px); }
.pj-card.unplayable { opacity: .4; cursor: not-allowed; }
.pj-card.selected { transform: translateY(-10px); box-shadow: 0 6px 12px rgba(0,0,0,.5), 0 0 0 2px var(--brass-bright); }

.pj-hand-wrap {
  position: sticky; bottom: 0;
  background: linear-gradient(180deg, transparent, rgba(6,16,11,.92) 30%);
  padding: 18px 4px 10px;
  margin: 0 -14px;
}
.pj-hand-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; padding: 0 10px; }

.pj-bid-panel { text-align: center; }
.pj-bid-options { display: flex; gap: 10px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }

.pj-log {
  font-size: 12.5px; color: var(--text-dim); max-height: 90px; overflow-y: auto;
  border-top: 1px dashed rgba(242,232,208,.15); padding-top: 10px; margin-top: 4px;
  line-height: 1.6;
}

.pj-ledger {
  background: var(--parchment); color: var(--ink); border-radius: 12px;
  padding: 18px; box-shadow: 0 6px 20px rgba(0,0,0,.35);
  font-family: 'Space Mono', monospace; font-size: 12.5px;
  position: relative;
}
.pj-ledger:before {
  content: '📌'; position: absolute; top: -14px; left: 50%; transform: translateX(-50%) rotate(-8deg);
  font-size: 20px; filter: drop-shadow(0 2px 2px rgba(0,0,0,.4));
}
.pj-ledger h3 { font-family: 'Fraunces', serif; font-size: 14px; text-align: center; margin: 4px 0 12px; letter-spacing: 1px; text-transform: uppercase; }
.pj-ledger table { width: 100%; border-collapse: collapse; }
.pj-ledger th, .pj-ledger td { padding: 5px 6px; text-align: center; border-bottom: 1px solid rgba(12,26,19,.15); }
.pj-ledger th { font-weight: 700; border-bottom: 2px solid var(--ink); }
.pj-ledger td.name-col, .pj-ledger th.name-col { text-align: left; }

.pj-details-panel { text-align: left; }
.pj-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.pj-tab-btn {
  flex: 1; padding: 8px 4px; border-radius: 8px; text-align: center;
  background: rgba(242,232,208,.07); border: 1px solid rgba(242,232,208,.18);
  color: var(--text-dim); font-size: 12px; font-family: 'Inter', sans-serif;
}
.pj-tab-btn.active { background: var(--brass); color: #2a1c05; font-weight: 700; border-color: var(--brass); }
.pj-details-panel table { width: 100%; border-collapse: collapse; font-family: 'Space Mono', monospace; font-size: 13px; }
.pj-details-panel th, .pj-details-panel td { padding: 7px 6px; text-align: center; border-bottom: 1px solid rgba(242,232,208,.12); color: var(--text-light); }
.pj-details-panel th { font-weight: 700; color: var(--brass-bright); border-bottom: 2px solid rgba(242,232,208,.3); }
.pj-details-panel td.name-col, .pj-details-panel th.name-col { text-align: left; }

.pj-summary-points { display: flex; flex-direction: column; gap: 6px; margin: 14px 0; }
.pj-summary-points .pt-row { display: flex; justify-content: space-between; font-size: 14px; padding: 6px 10px; background: rgba(0,0,0,.18); border-radius: 6px; }
.pj-summary-points .pt-row .label { color: var(--brass-bright); font-weight: 600; }
.pj-summary-points .pt-row .who { color: var(--text-dim); }
.pj-history-row { border-bottom: 1px dashed rgba(242,232,208,.12); padding: 10px 0; }
.pj-history-row:last-child { border-bottom: none; }
.pj-history-num { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-dim); margin-bottom: 6px; }

.pj-toast {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: var(--text-light); padding: 10px 18px;
  border-radius: 8px; font-size: 13.5px; box-shadow: 0 4px 14px rgba(0,0,0,.4);
  z-index: 50; border: 1px solid var(--brass); max-width: 90%; text-align: center;
}

.pj-rules-toggle { text-align: center; margin-top: 6px; }
.pj-rules-toggle a { color: var(--text-dim); font-size: 12.5px; cursor: pointer; text-decoration: underline; }
.pj-rules-box { font-size: 13px; line-height: 1.6; color: var(--text-dim); }
.pj-rules-box b { color: var(--text-light); }

.pj-winner-banner { text-align: center; padding: 30px 16px; }
.pj-official-message {
  font-family: 'Fraunces', serif; font-style: italic; font-size: 13px;
  color: var(--brass-bright); margin: 14px auto 0; max-width: 280px;
  padding-top: 12px; border-top: 1px dashed rgba(242,232,208,.25);
}
.pj-winner-banner .crown { font-size: 40px; }
.pj-winner-banner h2 { font-size: 30px; margin: 8px 0 4px; color: var(--brass-bright); }

@media (max-width: 480px) {
  .pj-home-hero h1 { font-size: 34px; }
  .pj-lobby-code .code { font-size: 30px; letter-spacing: 8px; }
  .pj-card { width: 46px; height: 64px; font-size: 16px; }
  .pj-card .suit { font-size: 16px; }
}
</style>
</head>
<body>

    rulesHtml: "<p><b>Goal:</b> be the first to reach {target} points.</p>"

      + "<p><b>Bidding:</b> the player to the dealer's left automatically opens at 1. The others bid (up to 9) or pass, in order, through the dealer. Then it comes back one last time to that first player, who can raise their bid or keep it at 1.</p>"
      + "<p><b>Trump:</b> whoever wins the bid (the \u201cpitcher\u201d) directly announces the trump suit.</p>"
      + "<p><b>Exchange:</b> everyone (pitcher included) keeps only their cards of the trump suit, discards the rest, and draws back up to 6 cards.</p>"

      + "<p><b>The pitcher</b> only scores their earned points if they meet their bid \u2014 otherwise they lose that many points (score can go negative), even if their bid was the automatic opening 1.</p>"
  }
};

function computeGameStats(room, myName){
  var hist = room.gameHistory || [];
  var bidsAttempted = 0, bidsSucceeded = 0, pidjouWins = 0, bestHandScore = -Infinity;
  var scores = {}; (room.players || []).forEach(function(p){ scores[p] = 0; });
  var worstDeficit = 0;
  hist.forEach(function(h){
    if (h.pitcher === myName){
      bidsAttempted++;
      if (h.made) bidsSucceeded++;
    }
    if (h.points){
      var pidjouPt = h.points.filter(function(pt){ return pt.label === "Pidjou"; })[0];
      if (pidjouPt && pidjouPt.winner === myName) pidjouWins++;
    }
    if (h.deltas && typeof h.deltas[myName] === "number"){
      if (h.deltas[myName] > bestHandScore) bestHandScore = h.deltas[myName];
      (room.players || []).forEach(function(p){ scores[p] = (scores[p]||0) + (h.deltas[p]||0); });
      var others = (room.players || []).filter(function(p){ return p !== myName; }).map(function(p){ return scores[p]; });
      var maxOther = others.length ? Math.max.apply(null, others) : 0;
      var diff = scores[myName] - maxOther;
      if (diff < worstDeficit) worstDeficit = diff;
    }
  });
  var won = room.winner === myName;
  var biggestComeback = (won && worstDeficit < 0) ? Math.abs(worstDeficit) : 0;
  return {
    won: won,
    bidsAttempted: bidsAttempted,
    bidsSucceeded: bidsSucceeded,
    pidjouWins: pidjouWins,
    bestHandScore: bestHandScore === -Infinity ? 0 : bestHandScore,
    biggestComeback: biggestComeback
  };
}
async function updateMyStats(room){
  if (!client.myId) return;
  var g = computeGameStats(room, client.myName);
  var path = "players/" + client.myId + "/stats";
  var existing = await dbGet(path);
  var s = existing || { gamesPlayed: 0, gamesWon: 0, bidsAttempted: 0, bidsSucceeded: 0, pidjouWins: 0, bestHandScore: 0, biggestComeback: 0, currentStreak: 0, bestStreak: 0 };
  s.gamesPlayed = (s.gamesPlayed || 0) + 1;
  if (g.won){ s.gamesWon = (s.gamesWon || 0) + 1; s.currentStreak = (s.currentStreak || 0) + 1; }
  else { s.currentStreak = 0; }
  if (s.currentStreak > (s.bestStreak || 0)) s.bestStreak = s.currentStreak;
  s.bidsAttempted = (s.bidsAttempted || 0) + g.bidsAttempted;
  s.bidsSucceeded = (s.bidsSucceeded || 0) + g.bidsSucceeded;
  s.pidjouWins = (s.pidjouWins || 0) + g.pidjouWins;
  if (g.bestHandScore > (s.bestHandScore || 0)) s.bestHandScore = g.bestHandScore;
  if (g.biggestComeback > (s.biggestComeback || 0)) s.biggestComeback = g.biggestComeback;
  await dbPut(path, s);
  var name = (client.homeNameDraft || client.myName || "").trim();
  if (name) await dbPut("players/" + client.myId + "/name", name);
}
function computeBadges(stats, knownList){
  stats = stats || {};
  var badges = [];
  if ((stats.gamesWon || 0) >= 1) badges.push("badge_firstWin");
  if ((stats.pidjouWins || 0) >= 5) badges.push("badge_pidjouMaster");
  if ((stats.bidsAttempted || 0) >= 10 && (stats.bidsSucceeded||0) / stats.bidsAttempted >= 0.8) badges.push("badge_safeBidder");
  if ((stats.bestStreak || 0) >= 10) badges.push("badge_streak10");
  else if ((stats.bestStreak || 0) >= 5) badges.push("badge_streak5");
  else if ((stats.bestStreak || 0) >= 3) badges.push("badge_streak3");
  if ((stats.gamesPlayed || 0) >= 100) badges.push("badge_veteran");
  if ((stats.biggestComeback || 0) >= 4) badges.push("badge_comeback");
  if ((knownList || []).some(function(p){ return (p.games||0) >= 20; })) badges.push("badge_rival");
  return badges;
}

// ============================== CARD HELPERS ==============================
function makeCard(rank, suit){ return rank + suit; }
function rankOf(card){ return card.slice(0, -1); }
function suitOf(card){ return card.slice(-1); }
function rankVal(card){ return RANK_VALUE[rankOf(card)]; }
function isRed(card){ return RED_SUITS.indexOf(suitOf(card)) !== -1; }
function cardSortKey(card){ return SUITS.indexOf(suitOf(card))*100 + rankVal(card); }
function buildDeck(){
  var deck = [];
  for (var s=0;s<SUITS.length;s++) for (var r=0;r<RANKS.length;r++) deck.push(makeCard(RANKS[r], SUITS[s]));
  return deck;
}
function secureRandom(){
  // Cryptographically secure uniform [0,1), same RNG class real-money card platforms use.
  // Falls back to Math.random() only if the Web Crypto API is unavailable (very old browsers).
  if (typeof crypto !== "undefined" && crypto.getRandomValues){
    var buf = new Uint32Array(1);
    crypto.getRandomValues(buf);
    return buf[0] / 4294967296; // 2^32
  }
  return Math.random();
}
function shuffle(arr){
  // Fisher-Yates (Knuth) shuffle: the standard, provably-unbiased algorithm for a uniformly
  // random permutation — every one of the n! orderings is equally likely.
  var a = arr.slice();
  for (var i=a.length-1;i>0;i--){
    var j = Math.floor(secureRandom()*(i+1));
    var tmp = a[i]; a[i]=a[j]; a[j]=tmp;
  }
  return a;
}
function genRoomCode(){
  var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ";
  var s = "";
  for (var i=0;i<4;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}

// ============================== GAME LOGIC ==============================
function freshRoomState(code, hostName){
  var scores = {}; scores[hostName] = 0;
  return {
    code: code, version: 0, createdAt: Date.now(),
    players: [hostName], targetScore: DEFAULT_TARGET, chosenDealer: hostName, bots: {}, avatars: {},
    playerIds: (function(){ var m = {}; if (client.myId) m[hostName] = client.myId; return m; })(),
    phase: "lobby", dealerIndex: -1, hands: {}, bidding: null,
    trump: null, pitcher: null, leadIndex: 0, turnIndex: 0,
    currentTrick: [], trickLog: [], scores: scores,
    handNumber: 0, gameNumber: 1, lastHandSummary: null, winner: null, gameHistory: [],
    log: [ { key: "log_tableCreated", params: { host: hostName } } ]
  };
}
function pushLog(state, key, params){
  state.log.push({ key: key, params: params || {} });
  if (state.log.length > LOG_CAP) state.log = state.log.slice(-LOG_CAP);
}
function startHand(state){
  var n = state.players.length;
  if (state.handNumber === 0 && state.chosenDealer){
    var chosenIdx = state.players.indexOf(state.chosenDealer);
    if (chosenIdx !== -1) state.dealerIndex = (chosenIdx - 1 + n) % n;
  }
  state.dealerIndex = (state.dealerIndex + 1) % n;
  var dealer = state.players[state.dealerIndex];
  var deck = shuffle(buildDeck());
  var hands = {};
  state.players.forEach(function(p){ hands[p] = []; });
  var di = 0;
  for (var c=0;c<CARDS_PER_HAND;c++){
    for (var i=0;i<n;i++){ hands[state.players[i]].push(deck[di++]); }
  }
  state.players.forEach(function(p){ hands[p].sort(function(a,b){ return cardSortKey(a)-cardSortKey(b); }); });
  state.hands = hands;
  state.stock = deck.slice(di);
  state.deadPile = [];

  // The player to the dealer's left gets an automatic standing bid of 1 (no active turn for it).
  // Bidding then goes normally from the 2nd player through the dealer, then wraps back to that
  // first player for one final real turn (raise, or keep their 1).
  var firstBidder = state.players[(state.dealerIndex+1)%n];
  var order = [];
  for (var k=2;k<=n;k++) order.push(state.players[(state.dealerIndex+k)%n]);
  order.push(firstBidder);
  var seededBids = {}; seededBids[firstBidder] = 1;
  state.bidding = { order: order, turnPtr: 0, bids: seededBids, highest: { player: firstBidder, amount: 1 }, firstBidder: firstBidder };

  state.trump = null; state.pitcher = null; state.currentTrick = []; state.trickLog = [];
  state.exchangeSummary = null; state.lastTrick = null;
  state.lastHandSummary = null; state.phase = "bidding"; state.handNumber += 1;
  pushLog(state, "log_dealStart", { n: state.handNumber, dealer: dealer });
  pushLog(state, "log_autoBid1", { player: firstBidder });
}
function placeBid(state, player, amount){
  if (state.phase !== "bidding") throw new Error("not-bidding-phase");
  var b = state.bidding;
  if (b.order[b.turnPtr] !== player) throw new Error("not-your-turn");
  var isFinalWrapTurn = player === b.firstBidder;

  if (amount === "pass"){
    // The first bidder's final turn just means "keep my standing 1" — their bid isn't withdrawn.
    if (!isFinalWrapTurn){
      b.bids[player] = "pass";
      pushLog(state, "log_bidPass", { player: player });
    } else {
      pushLog(state, "log_keepBid", { player: player });
    }
  } else {
    var min = b.highest.amount + 1;
    if (amount < min || amount > MAX_BID) throw new Error("invalid-bid");
    b.bids[player] = amount;
    b.highest = { player: player, amount: amount };
    pushLog(state, "log_bidAmount", { player: player, amount: amount });
  }

  b.turnPtr += 1;
  if (b.turnPtr >= b.order.length){
    state.pitcher = b.highest.player;
    state.leadIndex = state.players.indexOf(state.pitcher);
    state.turnIndex = state.leadIndex;
    state.phase = "chooseTrump";
    pushLog(state, "log_bidWon", { pitcher: state.pitcher, amount: b.highest.amount });
  }
}
function chooseTrump(state, player, suit){
  if (state.phase !== "chooseTrump") throw new Error("not-choose-trump-phase");
  if (player !== state.pitcher) throw new Error("not-your-turn");
  if (SUITS.indexOf(suit) === -1) throw new Error("invalid-suit");

  state.trump = suit;
  pushLog(state, "log_trumpSet", { suit: "{{suit:" + suit + "}}" });

  // Everyone keeps only trump cards. Discards are DEAD for the rest of the hand — they never
  // return to anyone, and specifically never back to the player who discarded them. Replacements
  // are drawn from the undealt stock first; a shared discard fallback only kicks in on the rare
  // occasion the stock alone can't cover everyone's redraw (and even then, a player's own
  // discards are excluded from what they personally can draw).
  var kept = {};
  var discardPile = [];
  state.players.forEach(function(p){
    var hand = state.hands[p] || [];
    var trumpCards = hand.filter(function(c){ return suitOf(c) === suit; });
    var others = hand.filter(function(c){ return suitOf(c) !== suit; });
    kept[p] = trumpCards;
    others.forEach(function(c){ discardPile.push({ card: c, from: p }); });
  });
  var drawPool = shuffle((state.stock || []).slice());
  var fallbackPool = shuffle(discardPile.slice());

  var summary = [];
  state.players.forEach(function(p){
    var need = CARDS_PER_HAND - kept[p].length;
    var drawn = [];
    while (drawn.length < need && drawPool.length){ drawn.push(drawPool.shift()); }
    while (drawn.length < need && fallbackPool.length){
      var idx = fallbackPool.findIndex(function(item){ return item.from !== p; });
      if (idx === -1) idx = 0; // absolute last resort: no non-own card left anywhere
      drawn.push(fallbackPool.splice(idx, 1)[0].card);
    }
    state.hands[p] = kept[p].concat(drawn).sort(function(a,b){ return cardSortKey(a)-cardSortKey(b); });
    summary.push({ player: p, kept: kept[p].slice(), discarded: discardPile.filter(function(d){ return d.from===p; }).map(function(d){ return d.card; }), drawn: drawn.slice() });
    pushLog(state, "log_discardDraw", { player: p, kept: kept[p].length, drawn: drawn.length });
  });
  state.stock = drawPool;
  state.deadPile = (state.deadPile || []).concat(fallbackPool.map(function(item){ return item.card; }));
  state.exchangeSummary = summary;

  state.phase = "playing";
}
function legalCards(hand, currentTrick, trump){
  if (currentTrick.length === 0) return hand.slice();
  var led = suitOf(currentTrick[0].card);
  if (led === trump){
    // Trump was led: you must follow trump if you hold any.
    var trumps = hand.filter(function(c){ return suitOf(c) === trump; });
    return trumps.length ? trumps : hand.slice();
  }
  // Any other suit was led: no restriction at all — play anything from your hand.
  return hand.slice();
}
function trickWinnerPlay(trick, trump){
  var trumps = trick.filter(function(c){ return suitOf(c.card) === trump; });
  var ledSuit = suitOf(trick[0].card);
  var pool = trumps.length ? trumps : trick.filter(function(c){ return suitOf(c.card) === ledSuit; });
  var best = pool[0];
  pool.forEach(function(c){ if (rankVal(c.card) > rankVal(best.card)) best = c; });
  var runnerUp = null;
  pool.forEach(function(c){
    if (c === best) return;
    if (!runnerUp || rankVal(c.card) > rankVal(runnerUp.card)) runnerUp = c;
  });
  return { player: best.player, card: best.card, wonByTrump: trumps.length > 0, runnerUpCard: runnerUp ? runnerUp.card : null };
}
function computePointsSnapshot(trickLog, players, trump, forceTieToPitcher, pitcher){
  var allPlays = [];
  trickLog.forEach(function(t){ t.cards.forEach(function(c){ allPlays.push({ player: c.player, card: c.card, trickWinner: t.winner }); }); });
  var trumpPlays = allPlays.filter(function(p){ return suitOf(p.card) === trump; });

  var highPt = null, lowPt = null, jackPt = null, pidjouPt = null;
  if (trumpPlays.length){
    var hi = trumpPlays[0], lo = trumpPlays[0];
    trumpPlays.forEach(function(p){
      if (rankVal(p.card) > rankVal(hi.card)) hi = p;
      if (rankVal(p.card) < rankVal(lo.card)) lo = p;
    });
    highPt = { player: hi.player, card: hi.card };
    lowPt = { player: lo.player, card: lo.card };
  }
  var jackPlay = trumpPlays.filter(function(p){ return rankOf(p.card) === "J"; })[0];
  if (jackPlay) jackPt = { player: jackPlay.trickWinner, card: jackPlay.card };
  var pidjouPlay = trumpPlays.filter(function(p){ return rankOf(p.card) === "5"; })[0];
  if (pidjouPlay) pidjouPt = { player: pidjouPlay.trickWinner, card: pidjouPlay.card };

  var totals = {};
  players.forEach(function(p){ totals[p] = 0; });
  trickLog.forEach(function(t){
    var val = t.cards.reduce(function(sum,c){ return sum + (GAME_POINT_VALUE[rankOf(c.card)] || 0); }, 0);
    totals[t.winner] += val;
  });
  var gamePt = null;
  var totalVals = players.map(function(p){ return totals[p]; });
  var maxTotal = Math.max.apply(null, totalVals);
  var gameTiedWinners = players.filter(function(p){ return totals[p] === maxTotal; });
  if (gameTiedWinners.length === 1){
    gamePt = { player: gameTiedWinners[0], total: maxTotal, tie: false };
  } else if (forceTieToPitcher){
    gamePt = { player: pitcher, total: maxTotal, tie: true };
  } else {
    gamePt = { player: null, total: maxTotal, tie: true, tiedPlayers: gameTiedWinners };
  }

  return [
    { label: "High", winner: highPt ? highPt.player : null, card: highPt ? highPt.card : null, kind: "card", value: POINT_VALUE.High },
    { label: "Low", winner: lowPt ? lowPt.player : null, card: lowPt ? lowPt.card : null, kind: "card", value: POINT_VALUE.Low },
    { label: "Jack", winner: jackPt ? jackPt.player : null, card: jackPt ? jackPt.card : null, kind: "jack", value: POINT_VALUE.Jack },
    { label: "Pidjou", winner: pidjouPt ? pidjouPt.player : null, card: pidjouPt ? pidjouPt.card : null, kind: "pidjou", value: POINT_VALUE.Pidjou },
    { label: "Game", winner: gamePt.player, total: gamePt.total, tie: gamePt.tie, kind: "game", value: POINT_VALUE.Game }
  ];
}
function playCard(state, player, card){
  if (state.phase !== "playing") throw new Error("not-playing-phase");
  var n = state.players.length;
  if (state.players[state.turnIndex] !== player) throw new Error("not-your-turn");
  var hand = state.hands[player];
  if (hand.indexOf(card) === -1) throw new Error("card-not-in-hand");
  var legal = legalCards(hand, state.currentTrick, state.trump);
  if (legal.indexOf(card) === -1) throw new Error("must-follow-suit");

  state.hands[player] = hand.filter(function(c){ return c !== card; });
  state.currentTrick.push({ player: player, card: card });
  pushLog(state, "log_cardPlayed", { player: player, card: "{{card:" + card + "}}" });

  if (state.currentTrick.length === n){
    var win = trickWinnerPlay(state.currentTrick, state.trump);
    state.trickLog.push({ winner: win.player, cards: state.currentTrick });
    state.lastTrick = { winner: win.player, card: win.card, wonByTrump: win.wonByTrump, runnerUpCard: win.runnerUpCard, cards: state.currentTrick };
    pushLog(state, "log_trickWon", { player: win.player });
    state.currentTrick = [];
    state.leadIndex = state.players.indexOf(win.player);
    state.turnIndex = state.leadIndex;
    var handEmpty = state.players.every(function(p){ return state.hands[p].length === 0; });
    if (handEmpty){ resolveHand(state); return; }
  } else {
    state.turnIndex = (state.turnIndex + 1) % n;
  }
}
function resolveHand(state){
  var trump = state.trump;
  var points = computePointsSnapshot(state.trickLog, state.players, trump, true, state.pitcher);

  var earned = {};
  state.players.forEach(function(p){ earned[p] = 0; });
  points.forEach(function(pt){ if (pt.winner) earned[pt.winner] += pt.value; });

  var bidAmount = state.bidding.highest.amount;
  var pitcher = state.pitcher;
  var pitcherMade = earned[pitcher] >= bidAmount;

  var deltas = {};
  state.players.forEach(function(p){
    deltas[p] = (p === pitcher) ? (pitcherMade ? earned[p] : -bidAmount) : earned[p];
  });
  state.players.forEach(function(p){ state.scores[p] = (state.scores[p]||0) + deltas[p]; });

  state.lastHandSummary = { points: points, pitcher: pitcher, bid: bidAmount, made: pitcherMade, earned: earned, deltas: deltas, trump: trump };
  state.gameHistory = state.gameHistory || [];
  state.gameHistory.push({ handNumber: state.handNumber, pitcher: pitcher, bid: bidAmount, made: pitcherMade, points: points, deltas: deltas });
  state.phase = "handSummary";
  if (pitcherMade) pushLog(state, "log_handMadeResult", { pitcher: pitcher, bid: bidAmount, earned: earned[pitcher] });
  else pushLog(state, "log_handFailedResult", { pitcher: pitcher, bid: bidAmount });

  var winner = null;
  if (pitcherMade && state.scores[pitcher] >= state.targetScore){
    winner = pitcher;
  } else {
    var candidates = state.players.filter(function(p){ return state.scores[p] >= state.targetScore; });
    if (candidates.length){
      winner = candidates.reduce(function(best,p){ return state.scores[p] > state.scores[best] ? p : best; }, candidates[0]);
    }
  }
  if (winner){
    state.winner = winner;
    pushLog(state, "log_gameWon", { winner: winner, score: state.scores[winner] });
  }
}

// ============================== BOT AI ==============================
var BOT_DIFFICULTIES = ["easy", "medium", "hard"];
var AVATAR_OPTIONS = ["\ud83e\udd9c","\ud83d\udc22","\ud83e\udd80","\ud83d\udc20","\ud83d\udc2c","\ud83e\udd88","\ud83e\udd8b","\ud83c\udf3a","\ud83c\udf34","\ud83e\udd65","\ud83c\udf4d","\ud83c\udfdd\ufe0f","\u2693","\ud83e\udd81","\ud83d\udc2f","\ud83e\udd8a"];
function botEvaluateSuit(hand, suit){
  var cards = hand.filter(function(c){ return suitOf(c) === suit; });
  var ranks = cards.map(rankOf);
  var hasAce = ranks.indexOf("A") !== -1;
  var hasKing = ranks.indexOf("K") !== -1;
  var hasJack = ranks.indexOf("J") !== -1;
  var hasFive = ranks.indexOf("5") !== -1;
  var hasLowCard = cards.some(function(c){ return rankVal(c) <= 4; }); // 2,3,4: plausibly the lowest trump in play
  // "Protection": another trump card strong enough that we're likely to win the trick even if
  // the Jack/5 alone wouldn't (mirrors: "you have the Pidjou AND something to protect it").
  var protection = cards.filter(function(c){ return rankVal(c) >= rankVal("Q" + suit); }).length;

  var securedPoints = 0;
  if (hasAce) securedPoints += 1; // High: guaranteed if we hold the top trump
  else if (hasKing) securedPoints += 0.5; // decent chance, not certain
  if (hasLowCard) securedPoints += 1; // Low: likely if we hold a very low trump
  if (hasJack) securedPoints += (hasAce || protection >= 1) ? 1 : 0.4; // Jack: needs protection to feel safe
  if (hasFive) securedPoints += (hasAce || protection >= 1) ? 5 : 2; // Pidjou (5 pts): same idea, higher stakes
  var gameVal = cards.reduce(function(s,c){ return s + (GAME_POINT_VALUE[rankOf(c)] || 0); }, 0);
  securedPoints += Math.min(1, gameVal / 15); // Game: rough partial credit from held high cards

  return { suit: suit, count: cards.length, securedPoints: securedPoints };
}
function botBestSuit(hand){
  var evals = SUITS.map(function(s){ return botEvaluateSuit(hand, s); });
  evals.sort(function(a,b){ return b.securedPoints - a.securedPoints; });
  return evals[0];
}
function botDecideBid(botName, difficulty, room){
  var hand = room.hands[botName] || [];
  var best = botBestSuit(hand);
  var min = room.bidding.highest.amount + 1;
  if (min > MAX_BID) return "pass";
  // Bid roughly what we can concretely expect to secure (High/Low/Jack/Pidjou/Game), shaved down
  // a bit for safety since failing a bid costs the FULL amount, not just the shortfall.
  // Easy stays loose/erratic instead of reasoning about securable points — that's what makes it weak.
  var estimate;
  if (difficulty === "easy"){
    var randomFactor = 0.5 + Math.random()*1.1;
    estimate = Math.round(best.securedPoints * randomFactor);
  } else {
    estimate = Math.floor(best.securedPoints);
  }
  estimate = Math.min(estimate, best.count + 1);
  estimate = Math.max(0, Math.min(MAX_BID, estimate));
  if (estimate >= min) return Math.min(estimate, MAX_BID);
  return "pass";
}
function botDecideTrump(botName, room){
  var hand = room.hands[botName] || [];
  return botBestSuit(hand).suit;
}
function botFindWinners(legal, room){
  var ledSuit = suitOf(room.currentTrick[0].card);
  var trumpsInTrick = room.currentTrick.filter(function(c){ return suitOf(c.card) === room.trump; });
  var currentBest = trumpsInTrick.length
    ? trumpsInTrick.reduce(function(a,b){ return rankVal(b.card)>rankVal(a.card)?b:a; })
    : room.currentTrick.filter(function(c){ return suitOf(c.card)===ledSuit; }).reduce(function(a,b){ return rankVal(b.card)>rankVal(a.card)?b:a; }, room.currentTrick[0]);
  return legal.filter(function(c){
    if (suitOf(c) === room.trump && suitOf(currentBest.card) !== room.trump) return true;
    if (suitOf(c) === suitOf(currentBest.card)) return rankVal(c) > rankVal(currentBest.card);
    return false;
  });
}
function isKeyTrump(c, trump){ return suitOf(c) === trump && (rankOf(c) === "J" || rankOf(c) === "5"); }
function botDecideCard(botName, difficulty, room){
  var hand = room.hands[botName] || [];
  var legal = legalCards(hand, room.currentTrick, room.trump);
  if (!legal.length) return null;
  if (difficulty === "easy") return legal[Math.floor(Math.random()*legal.length)];

  // Medium and hard share this reactive strategy: lead low non-trump to probe and conserve
  // trump; when following, win as cheaply as possible, else discard the lowest legal card.
  // One targeted exception: never voluntarily lead or throw away the trump Jack/5 (worth real
  // points) when a plain alternative exists and playing them wins nothing — but never hesitate
  // to use them normally when they're the card that actually wins the trick.
  if (room.currentTrick.length === 0){
    var nonTrumpLegal = legal.filter(function(c){ return suitOf(c) !== room.trump; });
    var pool = (nonTrumpLegal.length ? nonTrumpLegal : legal);
    var poolSafe = pool.filter(function(c){ return !isKeyTrump(c, room.trump); });
    var finalPool = (poolSafe.length ? poolSafe : pool).slice();
    finalPool.sort(function(a,b){ return rankVal(a)-rankVal(b); });
    return finalPool[0];
  }
  var winners = botFindWinners(legal, room);
  if (winners.length){
    return winners.slice().sort(function(a,b){ return rankVal(a)-rankVal(b); })[0];
  }
  var safeDiscards = legal.filter(function(c){ return !isKeyTrump(c, room.trump); });
  var finalDiscards = (safeDiscards.length ? safeDiscards : legal).slice();
  finalDiscards.sort(function(a,b){ return rankVal(a)-rankVal(b); });
  return finalDiscards[0];
}

async function mutate(fn, opts){
  opts = opts || {};
  if (client.busy) return false;
  client.busy = true;
  render();
  try {
    var latest = client.mode === "local" ? client.localRoom : await loadRoom(client.roomCode);
    if (!latest){ if (!opts.silent) showToast(t("toastRoomNotFound")); client.busy = false; render(); return false; }
    var next;
    try { next = fn(JSON.parse(JSON.stringify(latest))); }
    catch(err){
      if (!opts.silent) showToast(t(toastKeyForError(err.message)));
      client.room = latest; client.busy = false; render();
      return false;
    }
    if (next === false){ client.room = latest; client.busy = false; render(); return false; }
    next.version = (latest.version||0) + 1;
    if (client.mode === "local") client.localRoom = next;
    else await saveRoom(client.roomCode, next);
    client.room = next;
    if (opts.selectClear) client.selectedCard = null;
    return true;
  } catch(e){
    if (!opts.silent) showToast(t("toastNetworkError"));
    return false;
  } finally {
    client.busy = false;
    render();
  }
}

function handStripHtml(r, interactive){
  var myHand = r.hands[client.myName] || [];
  if (!myHand.length) return "";
  var isMyTurn = interactive && r.players[r.turnIndex] === client.myName;
  var legal = isMyTurn ? legalCards(myHand, r.currentTrick, r.trump) : [];
  var handRow = myHand.map(function(c){
    var playable = isMyTurn && legal.indexOf(c) !== -1;
    var blocked = isMyTurn && !playable;
    return cardEl(c, {
      playable: playable,
      unplayable: blocked,
      selected: client.selectedCard === c,
      onclick: playable ? ("pjSelectCard('" + c + "')") : (blocked ? "pjCardBlocked()" : "")
    });
  }).join("");
  return '<div class="pj-hand-wrap">'
    + '<div class="pj-hand-row">' + handRow + "</div>"
    + (interactive && client.selectedCard ? '<div style="text-align:center;margin-top:10px;"><button class="btn-primary" onclick="pjConfirmPlay()">' + esc(t("playBtn",{card: rankOf(client.selectedCard)+SUIT_SYMBOL[suitOf(client.selectedCard)]})) + "</button></div>" : "")
  + "</div>";
}
function cardEl(card, opts){
  opts = opts || {};
  var cls = ["pj-card"];
  if (isRed(card)) cls.push("red");
  if (opts.mini) cls.push("mini");
  if (opts.playable) cls.push("playable");
  if (opts.unplayable) cls.push("unplayable");
  if (opts.selected) cls.push("selected");
  var onclick = opts.onclick ? ('onclick="' + opts.onclick + '"') : "";
  return '<div class="' + cls.join(" ") + '" ' + onclick + '>'
    + "<div>" + esc(rankOf(card)) + "</div>"
    + '<div class="suit">' + SUIT_SYMBOL[suitOf(card)] + "</div>"
    + "</div>";

var anthemAudio = null;
function startAnthem(opts){
  opts = opts || {};
  if (anthemAudio) return;
  var fallbackUrl = "https://commons.wikimedia.org/wiki/File:National_anthem_of_Saint_Vincent_and_the_Grenadines,_performed_by_the_United_States_Navy_Band.oga";
  var audioUrl = "https://upload.wikimedia.org/wikipedia/commons/b/b3/National_anthem_of_Saint_Vincent_and_the_Grenadines,_performed_by_the_United_States_Navy_Band.oga";
  try {
    var audio = new Audio(audioUrl);
    var fell = false;
    function fallback(){
      if (fell) return; fell = true;
      if (anthemAudio === audio) { anthemAudio = null; render(); }
      if (!opts.silent) window.open(fallbackUrl, "_blank");
    }
    audio.addEventListener("error", fallback);
    audio.addEventListener("ended", function(){ if (anthemAudio === audio) { anthemAudio = null; render(); } });
    var p = audio.play();
    if (p && p.catch) p.catch(fallback);
    anthemAudio = audio;
    render();
    if (!opts.silent) showToast(t("toastAnthemPlaying"));
  } catch(e){ if (!opts.silent) window.open(fallbackUrl, "_blank"); }
}
window.pjPlayAnthem = function(){
  if (anthemAudio){
    anthemAudio.pause();
    anthemAudio = null;
    render();
    return;
  }

};

  if (pt.kind === "jack") return pt.winner ? (rankOf(pt.card) + SUIT_SYMBOL[suitOf(pt.card)]) : t("notDealt");

  if (pt.kind === "game") return pt.tie ? t("gameTieDetail", {n: pt.total}) : t("cardPointsSuffix", {n: pt.total});

function playBeep(){
  try {
    var Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    var ctx = new Ctx();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.35);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.4);
    setTimeout(function(){ try { ctx.close(); } catch(e){} }, 500);
  } catch(e){}
}
function playMelody(notes){
  try {
    var Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    var ctx = new Ctx();
    var maxEnd = 0;
    notes.forEach(function(n){
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = n.freq;
      var t0 = ctx.currentTime + (n.at || 0);
      var dur = n.dur || 0.3;
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(0.16, t0 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t0); osc.stop(t0 + dur + 0.05);
      maxEnd = Math.max(maxEnd, (n.at || 0) + dur);
    });
    setTimeout(function(){ try { ctx.close(); } catch(e){} }, (maxEnd + 0.5) * 1000);
  } catch(e){}
}

function playHandEndSound(made){
  if (made) playMelody([{ freq: 523, at: 0, dur: 0.15 }, { freq: 659, at: 0.13, dur: 0.25 }]);

}
function playVictorySound(){ playMelody([{ freq: 523, at: 0, dur: 0.15 }, { freq: 659, at: 0.14, dur: 0.15 }, { freq: 784, at: 0.28, dur: 0.45 }]); }
function flashTitleBriefly(){

function checkTurnAlert(){

  if (mine && key && key !== turnAlert.key){

var botDriver = { key: null, timer: null };
function currentActor(){
  var r = client.room;
  if (!r) return null;
  if (r.phase === "bidding") return r.bidding.order[r.bidding.turnPtr];
  if (r.phase === "chooseTrump") return r.pitcher;
  if (r.phase === "playing") return r.players[r.turnIndex];
  return null;

function maybeDriveBots(){
  var r = client.room;
  if (!r || !r.bots) return;
  var actor = currentActor();
  if (!actor || !r.bots[actor]) { botDriver.key = null; return; }
  var key = computeCurrentTurnKey();
  if (key === botDriver.key) return; // already scheduled/played for this exact turn
  botDriver.key = key;
  if (botDriver.timer) clearTimeout(botDriver.timer);
  var delay = 700 + Math.random() * 1100;
  botDriver.timer = setTimeout(function(){
    var room = client.room;
    if (!room || computeCurrentTurnKey() !== key) return; // state moved on already
    var botName = actor, difficulty = room.bots[botName];
    if (room.phase === "bidding"){
      var amount = botDecideBid(botName, difficulty, room);
      mutate(function(s){ placeBid(s, botName, amount); return s; }, { silent: true });
    } else if (room.phase === "chooseTrump"){
      var suit = botDecideTrump(botName, room);
      mutate(function(s){ chooseTrump(s, botName, suit); return s; }, { silent: true });
    } else if (room.phase === "playing"){
      var card = botDecideCard(botName, difficulty, room);
      if (card) mutate(function(s){ playCard(s, botName, card); return s; }, { silent: true });
    }
  }, delay);
}

    }
  }
  if (!client.room) renderHome();
  else if (client.room.phase === "lobby") renderLobby();
  else renderTable();
  checkTurnAlert();
  maybeDriveBots();
}
window.addEventListener("beforeunload", function(e){
  if (client.room && client.room.phase !== "lobby" && client.room.phase !== "gameOver"){
    e.preventDefault();
    e.returnValue = "";
    return "";
  }
});
startHeartbeat();
startInvitePolling();
render();
})();
</script>
</body>
</html>
