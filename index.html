var FIREBASE_DB_URL = "https://pidjou-default-rtdb.europe-west1.firebasedatabase.app";
// \u2191\u2191\u2191 REMPLACE la ligne ci-dessus par TON URL Firebase \u2191\u2191\u2191

var STORAGE_CONFIGURED = FIREBASE_DB_URL.indexOf("REMPLACE-MOI") === -1;

function roomUrl(code){ return FIREBASE_DB_URL.replace(/\/$/, "") + "/rooms/" + code + ".json"; }

function normalizeRoom(data){
  if (!data) return data;
  data.currentTrick = data.currentTrick || [];
  data.trickLog = data.trickLog || [];
  data.log = data.log || [];
  data.hands = data.hands || {};
  data.scores = data.scores || {};
  data.stock = data.stock || [];
  (data.players || []).forEach(function(p){
    if (!data.hands[p]) data.hands[p] = [];
    if (typeof data.scores[p] !== "number") data.scores[p] = 0;
  });
  if (data.bidding){
    data.bidding.bids = data.bidding.bids || {};
    data.bidding.order = data.bidding.order || [];
  }
  return data;
}
async function loadRoom(code){
  try {
    var res = await fetch(roomUrl(code));
    if (!res.ok) return null;
    var data = await res.json();
    return normalizeRoom(data) || null;
  } catch(e) { return null; }
}
async function saveRoom(code, state){
  await fetch(roomUrl(code), {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(state)
  });
}

// ============================== CARD HELPERS ==============================
function makeCard(rank, suit){ return rank + suit; }
function rankOf(card){ return card.slice(0, -1); }
function suitOf(card){ return card.slice(-1); }
function rankVal(card){ return RANK_VALUE[rankOf(card)]; }
function isRed(card){ return RED_SUITS.indexOf(suitOf(card)) !== -1; }
function cardSortKey(card){ return SUITS.indexOf(suitOf(card))*100 + rankVal(card); }
function buildDeck(){
  var deck = [];
  for (var s=0;s<SUITS.length;s++) for (var r=0;r<RANKS.length;r++) deck.push(makeCard(RANKS[r], SUITS[s]));
  return deck;
}
function shuffle(arr){
  var a = arr.slice();
  for (var i=a.length-1;i>0;i--){
    var j = Math.floor(Math.random()*(i+1));
    var tmp = a[i]; a[i]=a[j]; a[j]=tmp;
  }
  return a;
}
function genRoomCode(){
  var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ";
  var s = "";
  for (var i=0;i<4;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}

// ============================== GAME LOGIC ==============================
function freshRoomState(code, hostName){
  var scores = {}; scores[hostName] = 0;
  return {
    code: code, version: 0, createdAt: Date.now(),
    players: [hostName], targetScore: DEFAULT_TARGET,
    phase: "lobby", dealerIndex: -1, hands: {}, bidding: null,
    trump: null, pitcher: null, leadIndex: 0, turnIndex: 0,
    currentTrick: [], trickLog: [], scores: scores,
    handNumber: 0, lastHandSummary: null, winner: null,
    log: [ { key: "log_tableCreated", params: { host: hostName } } ]
  };
}
function pushLog(state, key, params){
  state.log.push({ key: key, params: params || {} });
  if (state.log.length > LOG_CAP) state.log = state.log.slice(-LOG_CAP);
}
function startHand(state){
  var n = state.players.length;
  state.dealerIndex = (state.dealerIndex + 1) % n;
  var dealer = state.players[state.dealerIndex];
  var deck = shuffle(buildDeck());
  var hands = {};
  state.players.forEach(function(p){ hands[p] = []; });
  var di = 0;
  for (var c=0;c<CARDS_PER_HAND;c++){
    for (var i=0;i<n;i++){ hands[state.players[i]].push(deck[di++]); }
  }
  state.players.forEach(function(p){ hands[p].sort(function(a,b){ return cardSortKey(a)-cardSortKey(b); }); });
  state.hands = hands;
  state.stock = deck.slice(di);

  var order = [];
  for (var k=1;k<=n;k++) order.push(state.players[(state.dealerIndex+k)%n]);
  state.bidding = { order: order, turnPtr: 0, bids: {}, highest: null };

  state.trump = null; state.pitcher = null; state.currentTrick = []; state.trickLog = [];
  state.exchangeSummary = null; state.lastTrick = null;
  state.lastHandSummary = null; state.phase = "bidding"; state.handNumber += 1;
  pushLog(state, "log_dealStart", { n: state.handNumber, dealer: dealer });
}
function placeBid(state, player, amount){
  if (state.phase !== "bidding") throw new Error("not-bidding-phase");
  var b = state.bidding;
  if (b.order[b.turnPtr] !== player) throw new Error("not-your-turn");
  var isDealer = player === state.players[state.dealerIndex];
  var isLastBidder = b.turnPtr === b.order.length - 1;
  var forcedDealer = isDealer && isLastBidder && b.highest === null;

  if (amount === "pass"){
    if (forcedDealer) throw new Error("dealer-must-bid");
    b.bids[player] = "pass";
    pushLog(state, "log_bidPass", { player: player });
  } else {
    var min = b.highest ? b.highest.amount + 1 : 1;
    if (amount < min || amount > MAX_BID) throw new Error("invalid-bid");
    b.bids[player] = amount;
    b.highest = { player: player, amount: amount };
    pushLog(state, "log_bidAmount", { player: player, amount: amount });
  }

  b.turnPtr += 1;
  if (b.turnPtr >= b.order.length){
    if (!b.highest){
      b.highest = { player: state.players[state.dealerIndex], amount: 1 };
      pushLog(state, "log_bidForced", { player: state.players[state.dealerIndex] });
    }
    state.pitcher = b.highest.player;
    state.leadIndex = state.players.indexOf(state.pitcher);
    state.turnIndex = state.leadIndex;
    state.phase = "chooseTrump";
    pushLog(state, "log_bidWon", { pitcher: state.pitcher, amount: b.highest.amount });
  }
}
function chooseTrump(state, player, suit){
  if (state.phase !== "chooseTrump") throw new Error("not-choose-trump-phase");
  if (player !== state.pitcher) throw new Error("not-your-turn");
  if (SUITS.indexOf(suit) === -1) throw new Error("invalid-suit");

  state.trump = suit;
  pushLog(state, "log_trumpSet", { suit: "{{suit:" + suit + "}}" });

  // Everyone keeps only trump cards; the rest goes into a shared pool with the leftover stock.
  var pool = (state.stock || []).slice();
  var kept = {};
  state.players.forEach(function(p){
    var hand = state.hands[p] || [];
    var trumpCards = hand.filter(function(c){ return suitOf(c) === suit; });
    var others = hand.filter(function(c){ return suitOf(c) !== suit; });
    kept[p] = trumpCards;
    pool = pool.concat(others);
  });
  pool = shuffle(pool);

  var summary = [];
  var pi = 0;
  state.players.forEach(function(p){
    var need = CARDS_PER_HAND - kept[p].length;
    var drawn = pool.slice(pi, pi + need);
    pi += need;
    state.hands[p] = kept[p].concat(drawn).sort(function(a,b){ return cardSortKey(a)-cardSortKey(b); });
    summary.push({ player: p, kept: kept[p].length, drawn: drawn.length });
    pushLog(state, "log_discardDraw", { player: p, kept: kept[p].length, drawn: drawn.length });
  });
  state.stock = pool.slice(pi);
  state.exchangeSummary = summary;

  state.phase = "playing";
}
function legalCards(hand, currentTrick){
  if (currentTrick.length === 0) return hand.slice();
  var led = suitOf(currentTrick[0].card);
  var followers = hand.filter(function(c){ return suitOf(c) === led; });
  return followers.length ? followers : hand.slice();
}
function trickWinnerPlay(trick, trump){
  var trumps = trick.filter(function(c){ return suitOf(c.card) === trump; });
  var ledSuit = suitOf(trick[0].card);
  var pool = trumps.length ? trumps : trick.filter(function(c){ return suitOf(c.card) === ledSuit; });
  var best = pool[0];
  pool.forEach(function(c){ if (rankVal(c.card) > rankVal(best.card)) best = c; });
  return { player: best.player, card: best.card, wonByTrump: trumps.length > 0 };
}
function computePointsSnapshot(trickLog, players, trump, forceTieToPitcher, pitcher){
  var allPlays = [];
  trickLog.forEach(function(t){ t.cards.forEach(function(c){ allPlays.push({ player: c.player, card: c.card, trickWinner: t.winner }); }); });
  var trumpPlays = allPlays.filter(function(p){ return suitOf(p.card) === trump; });

  var highPt = null, lowPt = null, jackPt = null, pidjouPt = null;
  if (trumpPlays.length){
    var hi = trumpPlays[0], lo = trumpPlays[0];
    trumpPlays.forEach(function(p){
      if (rankVal(p.card) > rankVal(hi.card)) hi = p;
      if (rankVal(p.card) < rankVal(lo.card)) lo = p;
    });
    highPt = { player: hi.player, card: hi.card };
    lowPt = { player: lo.player, card: lo.card };
  }
  var jackPlay = trumpPlays.filter(function(p){ return rankOf(p.card) === "J"; })[0];
  if (jackPlay) jackPt = { player: jackPlay.trickWinner, card: jackPlay.card };
  var pidjouPlay = trumpPlays.filter(function(p){ return rankOf(p.card) === "5"; })[0];
  if (pidjouPlay) pidjouPt = { player: pidjouPlay.trickWinner, card: pidjouPlay.card };

  var totals = {};
  players.forEach(function(p){ totals[p] = 0; });
  trickLog.forEach(function(t){
    var val = t.cards.reduce(function(sum,c){ return sum + (GAME_POINT_VALUE[rankOf(c.card)] || 0); }, 0);
    totals[t.winner] += val;
  });
  var gamePt = null;
  var totalVals = players.map(function(p){ return totals[p]; });
  var maxTotal = Math.max.apply(null, totalVals);
  var gameTiedWinners = players.filter(function(p){ return totals[p] === maxTotal; });
  if (maxTotal === 0){
    gamePt = { player: null, total: 0, tie: false };
  } else if (gameTiedWinners.length === 1){
    gamePt = { player: gameTiedWinners[0], total: maxTotal, tie: false };
  } else if (forceTieToPitcher){
    gamePt = { player: pitcher, total: maxTotal, tie: true };
  } else {
    gamePt = { player: null, total: maxTotal, tie: true, tiedPlayers: gameTiedWinners };
  }

  return [
    { label: "High", winner: highPt ? highPt.player : null, card: highPt ? highPt.card : null, kind: "card", value: POINT_VALUE.High },
    { label: "Low", winner: lowPt ? lowPt.player : null, card: lowPt ? lowPt.card : null, kind: "card", value: POINT_VALUE.Low },
    { label: "Jack", winner: jackPt ? jackPt.player : null, kind: "jack", value: POINT_VALUE.Jack },
    { label: "Pidjou", winner: pidjouPt ? pidjouPt.player : null, kind: "pidjou", value: POINT_VALUE.Pidjou },
    { label: "Game", winner: gamePt.player, total: gamePt.total, tie: gamePt.tie, kind: "game", value: POINT_VALUE.Game }
  ];
}
function playCard(state, player, card){
  if (state.phase !== "playing") throw new Error("not-playing-phase");
  var n = state.players.length;
  if (state.players[state.turnIndex] !== player) throw new Error("not-your-turn");
  var hand = state.hands[player];
  if (hand.indexOf(card) === -1) throw new Error("card-not-in-hand");
  var legal = legalCards(hand, state.currentTrick);
  if (legal.indexOf(card) === -1) throw new Error("must-follow-suit");

  state.hands[player] = hand.filter(function(c){ return c !== card; });
  state.currentTrick.push({ player: player, card: card });
  pushLog(state, "log_cardPlayed", { player: player, card: "{{card:" + card + "}}" });

  if (state.currentTrick.length === n){
    var win = trickWinnerPlay(state.currentTrick, state.trump);
    state.trickLog.push({ winner: win.player, cards: state.currentTrick });
    state.lastTrick = { winner: win.player, card: win.card, wonByTrump: win.wonByTrump, cards: state.currentTrick };
    pushLog(state, "log_trickWon", { player: win.player });
    state.currentTrick = [];
    state.leadIndex = state.players.indexOf(win.player);
    state.turnIndex = state.leadIndex;
    var handEmpty = state.players.every(function(p){ return state.hands[p].length === 0; });
    if (handEmpty){ resolveHand(state); return; }
  } else {
    state.turnIndex = (state.turnIndex + 1) % n;
  }
}
function resolveHand(state){
  var trump = state.trump;
  var points = computePointsSnapshot(state.trickLog, state.players, trump, true, state.pitcher);

  var earned = {};
  state.players.forEach(function(p){ earned[p] = 0; });
  points.forEach(function(pt){ if (pt.winner) earned[pt.winner] += pt.value; });

  var bidAmount = state.bidding.highest.amount;
  var pitcher = state.pitcher;
  var pitcherMade = earned[pitcher] >= bidAmount;

  var deltas = {};
  state.players.forEach(function(p){
    deltas[p] = (p === pitcher) ? (pitcherMade ? earned[p] : -bidAmount) : earned[p];
  });
  state.players.forEach(function(p){ state.scores[p] = (state.scores[p]||0) + deltas[p]; });

  state.lastHandSummary = { points: points, pitcher: pitcher, bid: bidAmount, made: pitcherMade, earned: earned, deltas: deltas, trump: trump };
  state.phase = "handSummary";
  if (pitcherMade) pushLog(state, "log_handMadeResult", { pitcher: pitcher, bid: bidAmount, earned: earned[pitcher] });
  else pushLog(state, "log_handFailedResult", { pitcher: pitcher, bid: bidAmount });

  var winner = null;
  if (pitcherMade && state.scores[pitcher] >= state.targetScore){
    winner = pitcher;
  } else {
    var candidates = state.players.filter(function(p){ return state.scores[p] >= state.targetScore; });
    if (candidates.length){
      winner = candidates.reduce(function(best,p){ return state.scores[p] > state.scores[best] ? p : best; }, candidates[0]);
    }
  }
  if (winner){
    state.winner = winner; state.phase = "gameOver";
    pushLog(state, "log_gameWon", { winner: winner, score: state.scores[winner] });
  }
}

var client = { myName: null, roomCode: null, room: null, busy: false, pollTimer: null,
  selectedCard: null, showRules: false, ledgerOpen: false, pointsOpen: false,
  joinCodeDraft: "", joinNameDraft: "", homeNameDraft: "", lang: "fr" };

function esc(s){ return String(s).replace(/[&<>"']/g, function(m){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]; }); }

function t(key, vars){
  var dict = STR[client.lang] || STR.fr;
  var s = dict[key] !== undefined ? dict[key] : (STR.fr[key] !== undefined ? STR.fr[key] : key);
  if (vars){
    Object.keys(vars).forEach(function(k){
      var v = vars[k];
      if (typeof v === "string" && v.indexOf("{{suit:") === 0){
        var suitCode = v.slice(7, -2);
        v = SUIT_SYMBOL[suitCode] + " " + dict["suit_" + suitCode];
      } else if (typeof v === "string" && v.indexOf("{{card:") === 0){
        var cardCode = v.slice(7, -2);
        v = rankOf(cardCode) + SUIT_SYMBOL[suitOf(cardCode)];
      }
      s = s.split("{" + k + "}").join(v);
    });
  }
  return s;
}
function cardsLabel(n){ return n + " " + (n === 1 ? t("cardWord") : t("cardWordPlural")); }
function suitFullLabel(suit){
  var dict = STR[client.lang] || STR.fr;
  return SUIT_SYMBOL[suit] + " " + dict["suit_" + suit];
}

function showToast(msg){
  var host = document.getElementById("pj-toast-host");
  var el = document.createElement("div");
  el.className = "pj-toast";
  el.textContent = msg;
  host.appendChild(el);
  setTimeout(function(){ el.remove(); }, 3200);
}

function toastKeyForError(msg){
  var map = {
    "not-bidding-phase": "toastNetworkError", "not-your-turn": "toastNetworkError",
    "dealer-must-bid": "mustBidAtLeast1", "invalid-bid": "toastNetworkError",
    "not-playing-phase": "toastNetworkError", "card-not-in-hand": "toastNetworkError",
    "must-follow-suit": "toastNetworkError", "invalid-target": "toastInvalidTarget"
  };
  return map[msg] || "toastNetworkError";
}

async function mutate(fn, opts){
  opts = opts || {};
  if (client.busy) return;
  client.busy = true;
  render();
  try {
    var latest = await loadRoom(client.roomCode);
    if (!latest){ showToast(t("toastRoomNotFound")); client.busy = false; render(); return; }
    var next;
    try { next = fn(JSON.parse(JSON.stringify(latest))); }
    catch(err){
      showToast(t(toastKeyForError(err.message)));
      client.room = latest; client.busy = false; render();
      return;
    }
    if (next === false){ client.room = latest; client.busy = false; render(); return; }
    next.version = (latest.version||0) + 1;
    await saveRoom(client.roomCode, next);
    client.room = next;
    if (opts.selectClear) client.selectedCard = null;
  } catch(e){
    showToast(t("toastNetworkError"));
  } finally {
    client.busy = false;
    render();
  }
}
async function pollOnce(){
  if (!client.roomCode || client.busy) return;
  var r = await loadRoom(client.roomCode);
  if (r) { client.room = r; render(); }
}
function startPolling(){
  if (client.pollTimer) clearInterval(client.pollTimer);
  client.pollTimer = setInterval(pollOnce, 2500);
}

window.pjSetLang = function(lang){ client.lang = lang; render(); };

window.pjCreateRoom = async function(){
  var name = (client.homeNameDraft || "").trim();
  if (!name){ showToast(t("toastEnterName")); return; }
  var code = genRoomCode();
  var state = freshRoomState(code, name);
  await saveRoom(code, state);
  client.myName = name; client.roomCode = code; client.room = state;
  startPolling(); render();
};

window.pjJoinRoom = async function(){
  var code = (client.joinCodeDraft || "").trim().toUpperCase();
  var name = (client.joinNameDraft || "").trim();
  if (!code || !name){ showToast(t("toastEnterCodeName")); return; }
  var room = await loadRoom(code);
  if (!room){ showToast(t("toastTableNotFound")); return; }
  if (room.players.indexOf(name) !== -1){
    client.myName = name; client.roomCode = code; client.room = room;
    startPolling(); render(); return;
  }
  if (room.phase !== "lobby"){ showToast(t("toastGameStarted")); return; }
  if (room.players.length >= MAX_PLAYERS){ showToast(t("toastTableFull")); return; }
  room.players.push(name);
  room.scores[name] = 0;
  pushLog(room, "log_playerJoined", { name: name });
  room.version += 1;
  await saveRoom(code, room);
  client.myName = name; client.roomCode = code; client.room = room;
  startPolling(); render();
};

window.pjLeaveTable = function(){
  if (client.pollTimer) clearInterval(client.pollTimer);
  client.myName = null; client.roomCode = null; client.room = null; client.selectedCard = null;
  render();
};
window.pjStartHand = function(){
  mutate(function(s){
    if (s.phase !== "lobby") return false;
    if (s.players.length < MIN_PLAYERS) throw new Error("need-2");
    startHand(s); return s;
  });
};
window.pjBid = function(amount){ mutate(function(s){ placeBid(s, client.myName, amount); return s; }); };
window.pjChooseTrump = function(suit){ mutate(function(s){ chooseTrump(s, client.myName, suit); return s; }); };
window.pjSelectCard = function(card){
  var room = client.room;
  if (!room || room.phase !== "playing") return;
  if (room.players[room.turnIndex] !== client.myName) return;
  var legal = legalCards(room.hands[client.myName], room.currentTrick);
  if (legal.indexOf(card) === -1) return;
  client.selectedCard = (client.selectedCard === card) ? null : card;
  render();
};
window.pjConfirmPlay = function(){
  if (!client.selectedCard) return;
  var card = client.selectedCard;
  mutate(function(s){ playCard(s, client.myName, card); return s; }, { selectClear: true });
};
window.pjNextHand = function(){
  mutate(function(s){ if (s.phase !== "handSummary") return false; startHand(s); return s; });
};
window.pjNewGame = function(){
  mutate(function(s){
    if (s.phase !== "gameOver") return false;
    s.players.forEach(function(p){ s.scores[p] = 0; });
    s.dealerIndex = -1; s.handNumber = 0; s.winner = null;
    pushLog(s, "log_newGame", {});
    startHand(s); return s;
  });
};
window.pjSetTarget = function(val){
  mutate(function(s){
    if (s.phase !== "lobby") return false;
    var v = parseInt(val, 10);
    if (!v || v < 5 || v > 200) throw new Error("invalid-target");
    s.targetScore = v; return s;
  });
};
window.pjToggleRules = function(){ client.showRules = !client.showRules; render(); };
window.pjToggleLedger = function(){ client.ledgerOpen = !client.ledgerOpen; render(); };
window.pjTogglePoints = function(){ client.pointsOpen = !client.pointsOpen; render(); };
window.pjCopyCode = function(){
  try { navigator.clipboard.writeText(client.roomCode); showToast(t("toastCodeCopied",{code:client.roomCode})); }

function handStripHtml(r, interactive){
  var myHand = r.hands[client.myName] || [];
  if (!myHand.length) return "";
  var isMyTurn = interactive && r.players[r.turnIndex] === client.myName;
  var legal = isMyTurn ? legalCards(myHand, r.currentTrick) : [];
  var handRow = myHand.map(function(c){
    var playable = isMyTurn && legal.indexOf(c) !== -1;
    return cardEl(c, {
      playable: playable,
      unplayable: isMyTurn && legal.indexOf(c) === -1,
      selected: client.selectedCard === c,
      onclick: playable ? ("pjSelectCard('" + c + "')") : ""
    });
  }).join("");
  return '<div class="pj-hand-wrap">'
    + '<div class="pj-hand-row">' + handRow + "</div>"
    + (interactive && client.selectedCard ? '<div style="text-align:center;margin-top:10px;"><button class="btn-primary" onclick="pjConfirmPlay()">' + esc(t("playBtn",{card: rankOf(client.selectedCard)+SUIT_SYMBOL[suitOf(client.selectedCard)]})) + "</button></div>" : "")
  + "</div>";
}
function cardEl(card, opts){
  opts = opts || {};
  var cls = ["pj-card"];
  if (isRed(card)) cls.push("red");
  if (opts.mini) cls.push("mini");
  if (opts.playable) cls.push("playable");
  if (opts.unplayable) cls.push("unplayable");
  if (opts.selected) cls.push("selected");
  var onclick = opts.onclick ? ('onclick="' + opts.onclick + '"') : "";
  return '<div class="' + cls.join(" ") + '" ' + onclick + '>'
    + "<div>" + esc(rankOf(card)) + "</div>"
    + '<div class="suit">' + SUIT_SYMBOL[suitOf(card)] + "</div>"
    + "</div>";
}

  if (pt.kind === "card"){
    return pt.card ? (rankOf(pt.card) + SUIT_SYMBOL[suitOf(pt.card)]) : "\u2014";
  }
  if (pt.kind === "jack") return pt.winner ? t("jackDetail") : t("notDealt");
  if (pt.kind === "pidjou") return pt.winner ? t("pidjouDetail") : t("notDealt");
  if (pt.kind === "game") return pt.tie ? t("gameTieDetail", {n: pt.total}) : t("cardPointsSuffix", {n: pt.total});
  return "";

function livePointDetail(pt){
  if (pt.kind === "card") return pt.card ? (rankOf(pt.card) + SUIT_SYMBOL[suitOf(pt.card)]) : t("liveNotYet");
  if (pt.kind === "jack") return pt.winner ? t("jackDetail") : t("liveNotYet");
  if (pt.kind === "pidjou") return pt.winner ? t("pidjouDetail") : t("liveNotYet");
  if (pt.kind === "game"){
    if (pt.winner) return t("cardPointsSuffix", {n: pt.total});
    if (pt.tie && pt.total > 0) return t("liveGameTie", {n: pt.total});
    return t("liveNotYet");
  }
  return "";
}

      + '<div class="pj-felt">' + feltInner + "</div>"
      + bottomPanel
      + ((r.phase === "playing" || r.phase === "handSummary") ? ('<div style="text-align:center;margin:10px 0 0;"><a style="color:var(--text-dim);font-size:12.5px;cursor:pointer;text-decoration:underline;" onclick="pjTogglePoints()">' + esc(client.pointsOpen?t("hideLivePoints"):t("showLivePoints")) + "</a></div>") : "")
      + (client.pointsOpen && (r.phase === "playing" || r.phase === "handSummary") ? livePointsHtml(r) : "")
      + '<div style="text-align:center;margin:14px 0 6px;"><a style="color:var(--text-dim);font-size:12.5px;cursor:pointer;text-decoration:underline;" onclick="pjToggleLedger()">' + esc(client.ledgerOpen?t("hideLedger"):t("showLedger")) + "</a></div>"
      + (client.ledgerOpen ? ledgerHtml() : "")
      + logHtml
    + "</div>";
}
function render(){
  if (!STORAGE_CONFIGURED){
    document.getElementById("pj-topbar-right").innerHTML = "";
    document.getElementById("pj-app").innerHTML =
      '<div class="pj-center"><div class="pj-panel" style="border-color:var(--rust);">'
      + '<h3 class="disp" style="color:var(--rust);">Configuration requise</h3>'
      + '<p style="font-size:14px;line-height:1.6;color:var(--text-light);">Ce fichier n\'est pas encore reli\u00e9 \u00e0 une base de donn\u00e9es. Ouvre le fichier <code>pidjou.html</code>, cherche la ligne <code>FIREBASE_DB_URL</code> tout en haut du script, et remplace-la par ton URL Firebase (voir les instructions fournies).</p>'
      + '</div></div>';
    return;
  }
  if (!client.room) renderHome();
  else if (client.room.phase === "lobby") renderLobby();
  else renderTable();
}
render();
})();
</script>
