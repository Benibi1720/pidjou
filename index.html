<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Pidjou</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#002674">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
html, body { margin: 0; padding: 0; width: 100%; overflow-x: hidden; }
*, *::before, *::after { -webkit-tap-highlight-color: transparent; }
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

#pidjou-root, #pidjou-root * { box-sizing: border-box; }
#pidjou-root {
  --felt-dark: #052e14;
  --felt: #0a5c28;
  --felt-light: #0f7d36;
  --flag-blue: #002674;
  --flag-blue-light: #2350a8;
  --ink: #051339;
  --parchment: #f2ecc9;
  --parchment-dim: #e6dba0;
  --brass: #fcd022;
  --brass-bright: #ffe066;
  --rust: #a6432e;
  --text-light: #f5f0da;
  --text-dim: #b8c9bb;
  font-family: 'Inter', sans-serif;
  color: var(--text-light);
  background: radial-gradient(ellipse at top, var(--felt-light), var(--felt-dark) 70%);
  min-height: 100vh;
  width: 100%;
  max-width: 100vw;
  padding: 0;
  position: relative;
  overflow-x: hidden;
}
#pidjou-root .disp { font-family: 'Fraunces', serif; }
#pidjou-root .mono { font-family: 'Space Mono', monospace; }

#pidjou-root button {
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  border: none;
  border-radius: 8px;
  transition: transform .12s ease, filter .12s ease, opacity .12s ease;
}
#pidjou-root button:active { transform: translateY(1px); }
#pidjou-root button:disabled { opacity: .35; cursor: not-allowed; transform: none; }
#pidjou-root button.btn-primary {
  background: linear-gradient(180deg, var(--brass-bright), var(--brass));
  color: #2a1c05;
  font-weight: 700;
  padding: 12px 22px;
  font-size: 15px;
  box-shadow: 0 2px 0 #8a6825, 0 6px 14px rgba(0,0,0,.35);
}
#pidjou-root button.btn-primary:hover:not(:disabled) { filter: brightness(1.06); }
#pidjou-root button.btn-ghost {
  background: transparent;
  color: var(--text-light);
  border: 1px solid rgba(242,232,208,.35);
  padding: 10px 18px;
  font-size: 14px;
}
#pidjou-root button.btn-ghost:hover:not(:disabled) { background: rgba(242,232,208,.08); }
#pidjou-root button.btn-small {
  padding: 7px 12px;
  font-size: 13px;
  background: rgba(242,232,208,.12);
  color: var(--text-light);
  border: 1px solid rgba(242,232,208,.25);
}
#pidjou-root button.btn-small:hover:not(:disabled) { background: rgba(242,232,208,.2); }
#pidjou-root button.btn-small.active { background: var(--brass); color: #2a1c05; border-color: var(--brass); }
#pidjou-root button.btn-neutral {
  background: rgba(242,232,208,.06);
  color: var(--text-light);
  border: 1px solid rgba(242,232,208,.2);
  padding: 12px 22px;
  font-size: 15px;
  font-weight: 500;
}
#pidjou-root button.btn-neutral:hover:not(:disabled) {
  background: rgba(242,232,208,.14);
  border-color: var(--brass-bright);
  font-weight: 700;
  color: var(--brass-bright);
}
#pidjou-root button.lang-btn {
  padding: 6px 10px;
  font-size: 12px;
  background: rgba(242,232,208,.08);
  color: var(--text-dim);
  border: 1px solid rgba(242,232,208,.2);
  font-family: 'Space Mono', monospace;
  letter-spacing: .5px;
}
#pidjou-root button.lang-btn.active {
  background: var(--brass);
  color: #2a1c05;
  border-color: var(--brass);
  font-weight: 700;
}
#pidjou-root button.bid-btn {
  background: var(--parchment);
  color: var(--ink);
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 17px;
  width: 44px; height: 44px;
  border-radius: 50%;
  box-shadow: 0 3px 0 #a89568;
}
#pidjou-root button.bid-btn:hover:not(:disabled) { filter: brightness(1.05); }
#pidjou-root input[type=text] {
  font-family: 'Space Mono', monospace;
  background: rgba(242,232,208,.1);
  border: 1px solid rgba(242,232,208,.35);
  color: var(--text-light);
  padding: 11px 14px;
  border-radius: 8px;
  font-size: 15px;
  letter-spacing: 1px;
  width: 100%;
}
#pidjou-root input[type=text]::placeholder { color: rgba(242,232,208,.4); }
#pidjou-root input[type=text]:focus, #pidjou-root button:focus-visible {
  outline: 2px solid var(--brass-bright);
  outline-offset: 2px;
}

.pj-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid rgba(0,38,116,.5);
  background: linear-gradient(180deg, rgba(0,38,116,.35), rgba(0,0,0,.15));
  gap: 10px; flex-wrap: wrap;
}
.pj-topbar-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.pj-brand { font-family: 'Fraunces', serif; font-weight: 700; font-size: 20px; letter-spacing: .5px; color: var(--brass-bright); }
.pj-brand span { color: var(--text-dim); font-family: 'Inter'; font-weight: 500; font-size: 12px; display:block; letter-spacing: 1.5px; text-transform: uppercase; margin-top: -2px;}
.pj-help-btn {
  width: 30px; height: 30px; border-radius: 50%; padding: 0;
  font-family: 'Fraunces', serif; font-weight: 700; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.pj-room-chip {
  font-family: 'Space Mono', monospace;
  background: rgba(35,80,168,.15);
  border: 1px dashed var(--flag-blue-light);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 14px;
  letter-spacing: 3px;
  cursor: pointer;
}
.pj-lang-toggle { display: flex; gap: 4px; align-items: center; }
.flag-btn {
  padding: 0; width: 30px; height: 22px;
  background: transparent; border: 1px solid rgba(242,232,208,.25);
  border-radius: 4px; overflow: hidden; display: flex; align-items: center; justify-content: center;
  margin-right: 2px;
}
.flag-btn:hover { border-color: var(--brass-bright); transform: scale(1.05); }
.flag-btn { position: relative; }
.flag-btn-playing { border-color: var(--brass-bright); box-shadow: 0 0 0 2px rgba(255,224,102,.4); }
.flag-btn-stop {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.55); color: var(--brass-bright); font-size: 10px;
}

.pj-center { max-width: 560px; margin: 0 auto; padding: 18px 20px 48px; }
.pj-home-hero { text-align: center; margin-bottom: 34px; }
.pj-home-hero h1 { font-size: 46px; margin: 0 0 6px; letter-spacing: .5px; }
.pj-home-hero p { color: var(--text-dim); font-size: 15px; line-height: 1.5; max-width: 380px; margin: 0 auto; }
.pj-card-suit-row { font-size: 22px; letter-spacing: 10px; margin: 0 0 16px; opacity: .8; }

.pj-panel {
  background: rgba(0,0,0,.2);
  border: 1px solid rgba(242,232,208,.14);
  border-radius: 14px;
  padding: 22px;
  margin-bottom: 16px;
}
.pj-gate-card { cursor: pointer; transition: border-color .15s, background .15s; }
.pj-gate-card:hover { border-color: var(--brass-bright); background: rgba(242,232,208,.06); }
.pj-gate-card:hover h3 { color: var(--brass-bright); }
.pj-gate-card:hover p { color: var(--text-light); font-weight: 600; }
.pj-panel h3 { font-family: 'Fraunces', serif; margin: 0 0 14px; font-size: 17px; font-weight: 600; color: var(--brass-bright); }
.pj-field-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-dim); margin-bottom: 6px; display: block; }
.pj-row { display: flex; gap: 10px; }
.pj-row > * { flex: 1; }
.pj-select {
  font-family: 'Inter', sans-serif;
  background: rgba(242,232,208,.1);
  border: 1px solid rgba(242,232,208,.35);
  color: var(--text-light);
  padding: 11px 14px;
  border-radius: 8px;
  font-size: 15px;
  width: 100%;
}
.pj-select option { background: var(--felt-dark); color: var(--text-light); }
.pj-divider-word {
  text-align: center; color: var(--text-dim); font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  margin: 26px 0; position: relative;
}
.pj-divider-word:before, .pj-divider-word:after {
  content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: rgba(242,232,208,.15);
}
.pj-divider-word:before { left: 0; } .pj-divider-word:after { right: 0; }
.pj-mode-heading {
  font-family: 'Fraunces', serif; font-size: 13px; text-transform: uppercase; letter-spacing: 2px;
  color: var(--brass-bright); text-align: center; margin: 8px 0 14px;
}
.pj-mode-divider { height: 2px; background: linear-gradient(90deg, transparent, var(--flag-blue-light), transparent); margin: 38px 0 22px; }

.pj-lobby-code { text-align: center; margin: 6px 0 26px; }
.pj-lobby-code .code { font-family: 'Space Mono', monospace; font-size: 40px; letter-spacing: 12px; color: var(--brass-bright); font-weight: 700; }
.pj-lobby-code .hint { color: var(--text-dim); font-size: 13px; margin-top: 6px; }
.pj-seat-list { list-style: none; margin: 0; padding: 0; }
.pj-seat-list li {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 4px; border-bottom: 1px solid rgba(242,232,208,.08);
  font-size: 15px;
}
.pj-seat-list li:last-child { border-bottom: none; }
.pj-seat-num {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--felt-light); border: 1px solid var(--brass);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-family: 'Space Mono'; color: var(--brass-bright);
  flex-shrink: 0;
}
.pj-seat-empty { color: var(--text-dim); font-style: italic; font-size: 14px; }
.pj-seat-avatar {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: var(--felt-light); border: 1px solid var(--brass);
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.pj-seat-avatar-pickable { cursor: pointer; border-color: var(--brass-bright); }
.pj-avatar-picker {
  display: flex !important; flex-wrap: wrap; gap: 8px; padding: 10px 4px 4px 34px !important;
  border-bottom: none !important;
}
.pj-avatar-option {
  width: 34px; height: 34px; border-radius: 50%; font-size: 17px;
  background: rgba(242,232,208,.07); border: 1px solid rgba(242,232,208,.18);
  display: flex; align-items: center; justify-content: center;
}
.pj-avatar-option.selected { background: var(--brass); border-color: var(--brass); }
.pj-bot-tag {
  display: inline-flex; align-items: center; gap: 3px;
  background: rgba(35,80,168,.2); border: 1px solid var(--flag-blue-light);
  color: var(--text-light); font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 4px;
}
.pj-bot-remove { color: var(--rust); cursor: pointer; margin-left: 8px; font-size: 13px; text-decoration: none; }
.pj-seat-addbot { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.pj-add-bot-label { color: var(--text-dim); font-size: 13px; font-style: italic; }
.pj-add-bot-btns { display: flex; gap: 6px; margin-left: auto; }
.pj-add-bot-btns button { font-size: 11px; padding: 5px 9px; }

.pj-table-wrap { max-width: 780px; margin: 0 auto; padding: 16px 14px 90px; }
.pj-players-strip { display: flex; gap: 8px; overflow-x: auto; padding: 4px 2px 14px; flex: 1 1 auto; min-width: 0; }
.pj-top-row { display: flex; align-items: flex-start; gap: 8px; }
.pj-target-line {
  text-align: center; font-size: 11px; color: var(--text-dim); letter-spacing: .5px;
  padding: 2px 0 8px; text-transform: uppercase;
}
.pj-trump-corner {
  flex: 0 0 auto; margin-top: 4px;
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(0,0,0,.3); border: 1px solid var(--brass);
  padding: 6px 12px; border-radius: 20px; font-size: 12.5px; color: var(--brass-bright);
  white-space: nowrap;
}
.pj-trump-corner-pending { border-color: rgba(242,232,208,.3); color: var(--text-dim); }
.pj-player-chip {
  flex: 0 0 auto;
  background: rgba(0,0,0,.22); border: 1px solid rgba(242,232,208,.15);
  border-radius: 10px; padding: 8px 12px; min-width: 92px;
  text-align: center; position: relative;
}
.pj-player-chip.is-turn { border-color: var(--brass-bright); box-shadow: 0 0 0 1px var(--brass-bright), 0 0 14px rgba(201,154,62,.35); }
.pj-player-chip.is-me { background: rgba(201,154,62,.12); }
.pj-player-chip .chip-avatar {
  font-size: 20px; line-height: 1; margin: 0 auto 2px;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; overflow: hidden;
}
.pj-player-chip .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }
.pj-player-chip .meta { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
.pj-player-chip .score { font-size: 11px; color: var(--brass-bright); margin-top: 2px; font-family: 'Space Mono', monospace; font-weight: 700; display: inline-block; }
.pj-player-chip .score.pulse { animation: scorePulse .7s ease; }
@keyframes scorePulse {
  0% { transform: scale(1); }
  35% { transform: scale(1.5); color: #7fbf7f; }
  100% { transform: scale(1); }
}
.pj-player-chip .tag { position: absolute; top: -8px; right: 6px; font-size: 9px; background: var(--brass); color: #2a1c05; padding: 1px 6px; border-radius: 8px; font-weight: 700; letter-spacing: .5px; }

.pj-felt {
  background: radial-gradient(ellipse at center, var(--felt-light), var(--felt) 75%);
  border: 6px solid #0a1e15;
  border-radius: 18px;
  box-shadow: inset 0 0 40px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
  padding: 26px 16px;
  min-height: 190px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px;
  margin-bottom: 16px;
}
.pj-trick-area { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; min-height: 78px; align-items: center;}
.pj-trick-card { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.pj-trick-card .who { font-size: 10px; color: var(--text-dim); letter-spacing: .5px; }
.pj-trick-card-winner .pj-card { box-shadow: 0 3px 6px rgba(0,0,0,.4), 0 0 0 2px var(--brass-bright); }
.pj-trick-card-winner .who { color: var(--brass-bright); font-weight: 700; }
.pj-status-line { font-family: 'Fraunces', serif; font-size: 16px; text-align: center; color: var(--parchment); }
.pj-status-line.mine { color: var(--brass-bright); font-weight: 700; }
.pj-trump-announce {
  font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; text-align: center;
  color: var(--brass-bright); padding: 18px 10px 6px;
  text-shadow: 0 2px 6px rgba(0,0,0,.4);
}
.pj-exchange-summary {
  text-align: center; font-size: 12.5px; color: var(--text-light); opacity: .85;
  padding-bottom: 10px; line-height: 1.7;
}
.pj-my-exchange { padding: 6px 8px 10px; }
.pj-my-exchange-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.pj-my-exchange-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; width: 62px; flex-shrink: 0; text-align: right; }
.pj-my-exchange-cards { display: flex; gap: 4px; flex-wrap: wrap; min-height: 30px; align-items: center; }
.pj-discarded-cards .pj-card { opacity: .35; filter: grayscale(1); }
.pj-last-trick {
  font-size: 12.5px; color: var(--text-dim); text-align: center;
  background: rgba(0,0,0,.22); border: 1px solid rgba(242,232,208,.15);
  padding: 10px 14px; border-radius: 12px; max-width: 100%;
}
.pj-last-trick b { color: var(--brass-bright); }
.pj-last-trick-label { text-transform: uppercase; letter-spacing: .5px; font-size: 10px; opacity: .7; margin-bottom: 4px; }
.pj-trump-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(0,0,0,.3); border: 1px solid var(--brass);
  padding: 4px 12px; border-radius: 20px; font-size: 13px; color: var(--brass-bright);
}

.pj-card {
  width: 54px; height: 76px;
  background: var(--parchment);
  border-radius: 7px;
  box-shadow: 0 3px 6px rgba(0,0,0,.4);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: 'Fraunces', serif; font-weight: 700; font-size: 19px;
  color: var(--ink); position: relative; flex-shrink: 0;
}
.pj-card.red { color: var(--rust); }
.pj-card .suit { font-size: 20px; margin-top: 2px; }
.pj-card.mini { width: 40px; height: 56px; font-size: 14px; }
.pj-card.mini .suit { font-size: 14px; }
.pj-card.playable { cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,.4), 0 0 0 2px var(--brass-bright); }
.pj-card.playable:hover { transform: translateY(-6px); }
.pj-card.unplayable { opacity: .4; cursor: not-allowed; }
.pj-card.selected { transform: translateY(-10px); box-shadow: 0 6px 12px rgba(0,0,0,.5), 0 0 0 2px var(--brass-bright); }

.pj-hand-wrap {
  position: sticky; bottom: 0;
  background: linear-gradient(180deg, transparent, rgba(6,16,11,.92) 30%);
  padding: 18px 4px 10px;
  margin: 0 -14px;
}
.pj-hand-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; padding: 0 10px; }

.pj-bid-panel { text-align: center; }
.pj-bid-options { display: flex; gap: 8px; justify-content: center; margin-top: 12px; flex-wrap: nowrap; overflow-x: auto; padding: 2px 4px 6px; -webkit-overflow-scrolling: touch; }
.pj-bid-options button { flex-shrink: 0; }

.pj-log {
  font-size: 12.5px; color: var(--text-dim); max-height: 90px; overflow-y: auto;
  border-top: 1px dashed rgba(242,232,208,.15); padding-top: 10px; margin-top: 4px;
  line-height: 1.6;
}

.pj-ledger {
  background: var(--parchment); color: var(--ink); border-radius: 12px;
  padding: 18px; box-shadow: 0 6px 20px rgba(0,0,0,.35);
  font-family: 'Space Mono', monospace; font-size: 12.5px;
  position: relative;
}
.pj-ledger:before {
  content: '📌'; position: absolute; top: -14px; left: 50%; transform: translateX(-50%) rotate(-8deg);
  font-size: 20px; filter: drop-shadow(0 2px 2px rgba(0,0,0,.4));
}
.pj-ledger h3 { font-family: 'Fraunces', serif; font-size: 14px; text-align: center; margin: 4px 0 12px; letter-spacing: 1px; text-transform: uppercase; }
.pj-ledger table { width: 100%; border-collapse: collapse; }
.pj-ledger th, .pj-ledger td { padding: 5px 6px; text-align: center; border-bottom: 1px solid rgba(12,26,19,.15); }
.pj-ledger th { font-weight: 700; border-bottom: 2px solid var(--ink); }
.pj-ledger td.name-col, .pj-ledger th.name-col { text-align: left; }

.pj-details-panel { text-align: left; }
.pj-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.pj-tab-btn {
  flex: 1; padding: 8px 4px; border-radius: 8px; text-align: center;
  background: rgba(242,232,208,.07); border: 1px solid rgba(242,232,208,.18);
  color: var(--text-dim); font-size: 12px; font-family: 'Inter', sans-serif;
}
.pj-tab-btn.active { background: var(--brass); color: #2a1c05; font-weight: 700; border-color: var(--brass); }
.pj-details-panel table { width: 100%; border-collapse: collapse; font-family: 'Space Mono', monospace; font-size: 13px; }
.pj-details-panel th, .pj-details-panel td { padding: 7px 6px; text-align: center; border-bottom: 1px solid rgba(242,232,208,.12); color: var(--text-light); }
.pj-details-panel th { font-weight: 700; color: var(--brass-bright); border-bottom: 2px solid rgba(242,232,208,.3); }
.pj-details-panel td.name-col, .pj-details-panel th.name-col { text-align: left; }

.pj-summary-points { display: flex; flex-direction: column; gap: 6px; margin: 14px 0; }
.pj-summary-points .pt-row { display: flex; justify-content: space-between; font-size: 14px; padding: 6px 10px; background: rgba(0,0,0,.18); border-radius: 6px; }
.pj-summary-points .pt-row .label { color: var(--brass-bright); font-weight: 600; }
.pj-summary-points .pt-row .who { color: var(--text-dim); }
.pj-history-row { border-bottom: 1px dashed rgba(242,232,208,.12); padding: 10px 0; }
.pj-history-row:last-child { border-bottom: none; }
.pj-history-num { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-dim); margin-bottom: 6px; }

.pj-toast {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: var(--text-light); padding: 10px 18px;

    rulesHtml: "<p><b>But :</b> être le premier à atteindre {target} points.</p>"
      + "<p><b>Donne :</b> 6 cartes chacun. L'hôte choisit qui distribue en premier ; le donneur change ensuite à chaque manche.</p>"
      + "<p><b>Enchères :</b> le joueur à gauche du donneur ouvre automatiquement à 1. Les autres misent (jusqu'à 9) ou passent, dans l'ordre, jusqu'au donneur. Puis ça revient une dernière fois sur ce premier joueur, qui peut monter sa mise ou la garder à 1.</p>"
      + "<p><b>Atout :</b> celui qui remporte l'enchère (le \u00ab\u00a0pitcher\u00a0\u00bb) annonce directement la couleur d'atout.</p>"
      + "<p><b>Échange :</b> tout le monde (pitcher inclus) garde uniquement ses cartes de la couleur d'atout, défausse le reste, et pioche pour revenir à 6 cartes.</p>"
      + "<p><b>Jouer :</b> si le pli est mené à l'atout, tu dois suivre l'atout si tu en as. Si le pli est mené dans une autre couleur, tu joues ce que tu veux, sans restriction. L'atout bat toujours les autres couleurs.</p>"
      + "<p><b>Points par manche (9 max) :</b> High (1 pt, plus gros atout joué), Low (1 pt, plus petit atout joué \u2014 pour son joueur, même si un autre remporte le pli), Jack (1 pt, qui remporte le pli du valet d'atout), <b>Pidjou (5 pts !)</b> qui remporte le pli du 5 d'atout, Game (1 pt, qui cumule le plus de valeur dans les plis qu'il a remportés : As=4, Roi=3, Dame=2, Valet=1, 10=10 \u2014 en cas d'égalité, le point va au pitcher).</p>"
      + "<p><b>Le pitcher</b> ne marque ses points que s'il atteint sa mise, sinon il perd ce nombre de points (score négatif possible), même si sa mise était l'ouverture automatique à 1.</p>"
  },

function roomUrl(code){ return FIREBASE_DB_URL.replace(/\/$/, "") + "/rooms/" + code + ".json"; }

function normalizeRoom(data){
  if (!data) return data;
  data.currentTrick = data.currentTrick || [];
  data.trickLog = data.trickLog || [];
  data.bots = data.bots || {};
  data.gameNumber = data.gameNumber || 1;
  data.avatars = data.avatars || {};
  data.playerIds = data.playerIds || {};
  data.deadPile = data.deadPile || [];
  if (data.exchangeSummary){
    data.exchangeSummary = data.exchangeSummary.map(function(row){
      return { player: row.player, kept: row.kept || [], discarded: row.discarded || [], drawn: row.drawn || [] };
    });
  }
  data.log = data.log || [];
  data.hands = data.hands || {};
  data.scores = data.scores || {};
  data.stock = data.stock || [];
  data.gameHistory = data.gameHistory || [];
  (data.players || []).forEach(function(p){
    if (!data.hands[p]) data.hands[p] = [];
    if (typeof data.scores[p] !== "number") data.scores[p] = 0;
  });
  if (data.bidding){
    data.bidding.bids = data.bidding.bids || {};
    data.bidding.order = data.bidding.order || [];
  }
  return data;
}
async function loadRoom(code){
  try {
    var res = await fetch(roomUrl(code));
    if (!res.ok) return null;
    var data = await res.json();
    return normalizeRoom(data) || null;
  } catch(e) { return null; }
}

function computeGameStats(room, myName){
  var hist = room.gameHistory || [];
  var bidsAttempted = 0, bidsSucceeded = 0, pidjouWins = 0, pidjouSteals = 0, pidjouLost = 0, bestHandScore = -Infinity;
  var perfectHands = 0, bestBidMade = 0, hadPidjou = false, consecutiveFails = 0, hadTwoFailsInARow = false;
  var scores = {}; (room.players || []).forEach(function(p){ scores[p] = 0; });
  var worstDeficit = 0;
  hist.forEach(function(h){
    if (h.pitcher === myName){
      bidsAttempted++;
      if (h.made){
        bidsSucceeded++;
        consecutiveFails = 0;
        if (h.bid > bestBidMade) bestBidMade = h.bid;
      } else {
        consecutiveFails++;
        if (consecutiveFails >= 2) hadTwoFailsInARow = true;
      }
    }
    if (h.points){
      var pidjouPt = h.points.filter(function(pt){ return pt.label === "Pidjou"; })[0];
      if (pidjouPt && pidjouPt.winner === myName){
        pidjouWins++;
        hadPidjou = true;
        if (pidjouPt.playedBy && pidjouPt.playedBy !== myName) pidjouSteals++;
      }
      if (pidjouPt && pidjouPt.playedBy === myName && pidjouPt.winner !== myName) pidjouLost++;
      var earnedThisHand = h.points.reduce(function(sum, pt){ return sum + (pt.winner === myName ? pt.value : 0); }, 0);
      if (earnedThisHand === 9) perfectHands++;
    }
    if (h.deltas && typeof h.deltas[myName] === "number"){
      if (h.deltas[myName] > bestHandScore) bestHandScore = h.deltas[myName];
      (room.players || []).forEach(function(p){ scores[p] = (scores[p]||0) + (h.deltas[p]||0); });
      var others = (room.players || []).filter(function(p){ return p !== myName; }).map(function(p){ return scores[p]; });
      var maxOther = others.length ? Math.max.apply(null, others) : 0;
      var diff = scores[myName] - maxOther;
      if (diff < worstDeficit) worstDeficit = diff;
    }
  });
  var won = room.winner === myName;
  var biggestComeback = (won && worstDeficit < 0) ? Math.abs(worstDeficit) : 0;
  var others2 = (room.players || []).filter(function(p){ return p !== myName; }).map(function(p){ return scores[p]||0; });
  var winMargin = (won && others2.length) ? (scores[myName] - Math.max.apply(null, others2)) : 0;
  return {
    won: won,
    bidsAttempted: bidsAttempted,
    bidsSucceeded: bidsSucceeded,
    pidjouWins: pidjouWins,
    pidjouSteals: pidjouSteals,
    pidjouLost: pidjouLost,
    hadPidjou: hadPidjou,
    bestHandScore: bestHandScore === -Infinity ? 0 : bestHandScore,
    biggestComeback: biggestComeback,
    perfectHands: perfectHands,
    bestBidMade: bestBidMade,
    winMargin: winMargin,
    coolHead: won && hadTwoFailsInARow
  };
}
async function updateMyStats(room){
  if (!client.myId || client.isGuest) return;
  var g = computeGameStats(room, client.myName);
  var path = "players/" + client.myId + "/stats";
  var existing = await dbGet(path);
  var s = existing || { gamesPlayed: 0, gamesWon: 0, bidsAttempted: 0, bidsSucceeded: 0, pidjouWins: 0, pidjouSteals: 0, pidjouLost: 0, gamesWithPidjou: 0, gamesWonWithPidjou: 0, bestHandScore: 0, biggestComeback: 0, currentStreak: 0, bestStreak: 0, perfectHands: 0, bestBidMade: 0, bestWinMargin: 0, hadColdBlood: false, lastRank: null, bestRankClimb: 0, leaguePoints: 0 };
  s.gamesPlayed = (s.gamesPlayed || 0) + 1;
  if (g.won){ s.gamesWon = (s.gamesWon || 0) + 1; s.currentStreak = (s.currentStreak || 0) + 1; }
  else { s.currentStreak = 0; }
  if (s.currentStreak > (s.bestStreak || 0)) s.bestStreak = s.currentStreak;
  s.bidsAttempted = (s.bidsAttempted || 0) + g.bidsAttempted;
  s.bidsSucceeded = (s.bidsSucceeded || 0) + g.bidsSucceeded;
  s.pidjouWins = (s.pidjouWins || 0) + g.pidjouWins;
  s.pidjouSteals = (s.pidjouSteals || 0) + g.pidjouSteals;
  s.pidjouLost = (s.pidjouLost || 0) + g.pidjouLost;
  if (g.hadPidjou){
    s.gamesWithPidjou = (s.gamesWithPidjou || 0) + 1;
    if (g.won) s.gamesWonWithPidjou = (s.gamesWonWithPidjou || 0) + 1;
  }
  if (g.bestHandScore > (s.bestHandScore || 0)) s.bestHandScore = g.bestHandScore;
  if (g.biggestComeback > (s.biggestComeback || 0)) s.biggestComeback = g.biggestComeback;
  s.perfectHands = (s.perfectHands || 0) + g.perfectHands;
  if (g.bestBidMade > (s.bestBidMade || 0)) s.bestBidMade = g.bestBidMade;
  if (g.winMargin > (s.bestWinMargin || 0)) s.bestWinMargin = g.winMargin;
  if (g.coolHead) s.hadColdBlood = true;
  var gamePoints = g.won ? 3 : 0;
  s.leaguePoints = (s.leaguePoints || 0) + gamePoints;
  s.recentResults = s.recentResults || [];
  s.recentResults.push(g.won);
  if (s.recentResults.length > 5) s.recentResults.shift();
  await dbPut(path, s);
  var name = (client.homeNameDraft || client.myName || "").trim();
  if (name) await dbPut("players/" + client.myId + "/name", name);
}
function computeBadges(stats, knownList){
  stats = stats || {};
  var badges = [];
  if ((stats.gamesWon || 0) >= 1) badges.push("badge_firstWin");
  if ((stats.pidjouWins || 0) >= 5) badges.push("badge_pidjouMaster");
  if ((stats.bidsAttempted || 0) >= 10 && (stats.bidsSucceeded||0) / stats.bidsAttempted >= 0.8) badges.push("badge_safeBidder");
  if ((stats.bestStreak || 0) >= 10) badges.push("badge_streak10");
  else if ((stats.bestStreak || 0) >= 5) badges.push("badge_streak5");
  else if ((stats.bestStreak || 0) >= 3) badges.push("badge_streak3");
  if ((stats.gamesPlayed || 0) >= 100) badges.push("badge_veteran");
  if ((stats.biggestComeback || 0) >= 4) badges.push("badge_comeback");
  if ((knownList || []).some(function(p){ return (p.games||0) >= 20; })) badges.push("badge_rival");
  if ((stats.pidjouSteals || 0) >= 5) badges.push("badge_thief");
  if ((stats.pidjouWins || 0) >= 10 && (stats.pidjouLost || 0) === 0) badges.push("badge_bodyguard");
  if ((stats.bestRankClimb || 0) >= 5) badges.push("badge_climbing");
  if ((stats.bestBidMade || 0) >= 7) badges.push("badge_boldBidder");
  if ((stats.perfectHands || 0) >= 1) badges.push("badge_perfectHand");
  if ((stats.bestWinMargin || 0) >= 15) badges.push("badge_dominant");
  if (stats.hadColdBlood) badges.push("badge_coolHead");
  return badges;
}

// ============================== CARD HELPERS ==============================
function makeCard(rank, suit){ return rank + suit; }
function rankOf(card){ return card.slice(0, -1); }
function suitOf(card){ return card.slice(-1); }
function rankVal(card){ return RANK_VALUE[rankOf(card)]; }
function isRed(card){ return RED_SUITS.indexOf(suitOf(card)) !== -1; }
function cardSortKey(card){ return SUITS.indexOf(suitOf(card))*100 + rankVal(card); }
function buildDeck(){
  var deck = [];
  for (var s=0;s<SUITS.length;s++) for (var r=0;r<RANKS.length;r++) deck.push(makeCard(RANKS[r], SUITS[s]));
  return deck;
}
function secureRandom(){
  // Cryptographically secure uniform [0,1), same RNG class real-money card platforms use.
  // Falls back to Math.random() only if the Web Crypto API is unavailable (very old browsers).
  if (typeof crypto !== "undefined" && crypto.getRandomValues){
    var buf = new Uint32Array(1);
    crypto.getRandomValues(buf);
    return buf[0] / 4294967296; // 2^32
  }
  return Math.random();
}
function shuffle(arr){
  // Fisher-Yates (Knuth) shuffle: the standard, provably-unbiased algorithm for a uniformly
  // random permutation — every one of the n! orderings is equally likely.
  var a = arr.slice();
  for (var i=a.length-1;i>0;i--){
    var j = Math.floor(secureRandom()*(i+1));
    var tmp = a[i]; a[i]=a[j]; a[j]=tmp;
  }
  return a;
}
function genRoomCode(){
  var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ";
  var s = "";
  for (var i=0;i<4;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}

function botEvaluateSuit(hand, suit){

  if (hasLowCard) securedPoints += 1; // Low: likely if we hold a very low trump
  if (hasJack) securedPoints += (hasAce || protection >= 1) ? 1 : 0.4; // Jack: needs protection to feel safe
  if (hasFive) securedPoints += (hasAce || protection >= 1) ? 5 : 2; // Pidjou (5 pts): same idea, higher stakes
  var gameVal = cards.reduce(function(s,c){ return s + (GAME_POINT_VALUE[rankOf(c)] || 0); }, 0);

  // Easy stays loose/erratic instead of reasoning about securable points — that's what makes it weak.

window.pjRematch = async function(){
  var old = client.room;
  if (!old) return;
  var name = client.myName;
  var code = genRoomCode();
  var state = freshRoomState(code, name);
  (old.players || []).forEach(function(p){
    if (p === name) return;
    if (old.bots && old.bots[p]){
      if (state.players.length < MAX_PLAYERS){
        state.players.push(p);
        state.scores[p] = 0;
        state.bots[p] = old.bots[p];
      }
    }
  });
  await saveRoom(code, state);
  var humanOpponents = (old.players || []).filter(function(p){
    return p !== name && !(old.bots && old.bots[p]) && old.playerIds && old.playerIds[p];
  });
  var sentCount = 0;
  for (var i=0;i<humanOpponents.length;i++){
    var pName = humanOpponents[i];
    var otherId = old.playerIds[pName];
    var already = await hasPendingInviteBetween(client.myId, otherId);
    if (already) continue;
    var inviteId = "i" + Date.now().toString(36) + Math.random().toString(36).slice(2, 8) + i;
    await dbPut("invites/" + inviteId, {
      fromId: client.myId, fromName: name, toId: otherId, toName: pName,
      roomCode: code, status: "pending", createdAt: Date.now()
    });
    sentCount++;
  }
  if (sentCount) showToast(t("rematchSentToast"));
  if (client.pollTimer) clearInterval(client.pollTimer);
  client.myName = name; client.roomCode = code; client.room = state;
  if (invitePollTimer) clearInterval(invitePollTimer);
  startPolling(); render();
};

        rows.push({ id: id, name: p.name || "?", stats: p.stats });
      }
    });
    rows.sort(function(a,b){ return (b.stats.leaguePoints||0) - (a.stats.leaguePoints||0) || (b.stats.gamesWon||0) - (a.stats.gamesWon||0); });
  }

    var myRank = myIndex + 1;
    var statsPath = "players/" + client.myId + "/stats";

      if (typeof prevRank === "number"){
        var climb = prevRank - myRank;

        if (climb > (s.bestRankClimb || 0)){

function handStripHtml(r, interactive){
  var myHand = r.hands[client.myName] || [];
  if (!myHand.length) return "";
  var isMyTurn = interactive && r.players[r.turnIndex] === client.myName;
  var legal = isMyTurn ? legalCards(myHand, r.currentTrick, r.trump) : [];
  var handRow = myHand.map(function(c){
    var playable = isMyTurn && legal.indexOf(c) !== -1;
    var blocked = isMyTurn && !playable;
    return cardEl(c, {
      playable: playable,
      unplayable: blocked,
      selected: client.selectedCard === c,
      onclick: playable ? ("pjSelectCard('" + c + "')") : (blocked ? "pjCardBlocked()" : "")
    });
  }).join("");
  return '<div class="pj-hand-wrap">'
    + '<div class="pj-hand-row">' + handRow + "</div>"
    + (interactive && client.selectedCard ? '<div style="text-align:center;margin-top:10px;"><button class="btn-primary" onclick="pjConfirmPlay()">' + esc(t("playBtn",{card: rankOf(client.selectedCard)+SUIT_SYMBOL[suitOf(client.selectedCard)]})) + "</button></div>" : "")

  return '<div class="' + cls.join(" ") + '" ' + onclick + '>'

function startAnthem(opts){
  opts = opts || {};
  if (anthemAudio) return;
  var fallbackUrl = "https://commons.wikimedia.org/wiki/File:National_anthem_of_Saint_Vincent_and_the_Grenadines,_performed_by_the_United_States_Navy_Band.oga";
  var audioUrl = "https://upload.wikimedia.org/wikipedia/commons/b/b3/National_anthem_of_Saint_Vincent_and_the_Grenadines,_performed_by_the_United_States_Navy_Band.oga";
  try {
    var audio = new Audio(audioUrl);
    var fell = false;
    function fallback(){
      if (fell) return; fell = true;
      if (anthemAudio === audio) { anthemAudio = null; render(); renderMusicPanel(); }
      if (!opts.silent) window.open(fallbackUrl, "_blank");
    }
    audio.addEventListener("error", fallback);
    audio.addEventListener("ended", function(){
      if (anthemAudio === audio){
        anthemAudio = null; render(); renderMusicPanel();
        if (client.anthemFromPlaylist){
          client.anthemFromPlaylist = false;
          if (client.musicLoop !== false) window.pjMusicNext();
        }
      }
    });
    var p = audio.play();
    if (p && p.catch) p.catch(fallback);
    anthemAudio = audio;
    render();
    renderMusicPanel();
    if (!opts.silent) showToast(t("toastAnthemPlaying"));
  } catch(e){ if (!opts.silent) window.open(fallbackUrl, "_blank"); }
}

function statCategoriesHtml(stats){
  stats = stats || {};
  var pct = function(num, den){ return den ? Math.round(100 * num / den) : 0; };
  var winRate = pct(stats.gamesWon, stats.gamesPlayed);
  var bidRate = pct(stats.bidsSucceeded, stats.bidsAttempted);
  var bidsFailed = (stats.bidsAttempted||0) - (stats.bidsSucceeded||0);
  var bidsFailedRate = pct(bidsFailed, stats.bidsAttempted);
  var pidjouWinRate = pct(stats.gamesWonWithPidjou, stats.gamesWithPidjou);
  var pidjouWinShare = pct(stats.pidjouWins, stats.gamesPlayed);
  var pidjouStealShare = pct(stats.pidjouSteals, stats.pidjouWins);
  var pidjouLostShare = pct(stats.pidjouLost, (stats.pidjouWins||0) + (stats.pidjouLost||0));
  var perfectHandsShare = pct(stats.perfectHands, stats.gamesPlayed);
  function group(icon, title, cells){
    return '<div class="pj-stat-group">'
      + '<div class="pj-stat-group-title">' + icon + " " + esc(title) + "</div>"
      + '<div class="pj-stat-grid">' + cells.map(function(c){
          return '<div class="pj-stat-cell"><div class="pj-stat-icon">' + c[0] + '</div><div><div class="pj-stat-value">' + c[2] + '</div><div class="pj-stat-label">' + esc(c[1]) + "</div></div></div>";
        }).join("") + "</div>"
    + "</div>";
  }
  var hero = '<div class="pj-stat-hero"><div class="pj-stat-hero-value">' + (stats.leaguePoints||0) + '</div><div class="pj-stat-hero-label">' + esc(t("statLeaguePoints")) + "</div></div>";
  return hero
    + group("\ud83d\udcca", t("statGroupGeneral"), [
      ["\ud83c\udfae", t("statGamesPlayed"), stats.gamesPlayed||0],
      ["\ud83c\udfc6", t("statGamesWon"), (stats.gamesWon||0) + " (" + winRate + "%)"],
      ["\ud83d\udd25", t("statBestStreak"), stats.bestStreak||0]
    ])
    + group("\ud83c\udfaf", t("statGroupBids"), [
      ["\u2705", t("statBidSuccess"), (stats.bidsSucceeded||0) + "/" + (stats.bidsAttempted||0) + " (" + bidRate + "%)"],
      ["\u274c", t("statBidsFailed"), bidsFailed + " (" + bidsFailedRate + "%)"],
      ["\ud83c\udfaf", t("statBestBidMade"), stats.bestBidMade||0]
    ])
    + group("5\ufe0f\u20e3", t("statGroupPidjou"), [
      ["\ud83c\udccf", t("statPidjou"), (stats.pidjouWins||0) + " (" + pidjouWinShare + "%)"],
      ["\ud83e\udd77", t("statPidjouSteals"), (stats.pidjouSteals||0) + " (" + pidjouStealShare + "%)"],
      ["\ud83d\ude25", t("statPidjouLost"), (stats.pidjouLost||0) + " (" + pidjouLostShare + "%)"],
      ["\ud83d\udcc8", t("statPidjouWinRate"), (stats.gamesWonWithPidjou||0) + "/" + (stats.gamesWithPidjou||0) + " (" + pidjouWinRate + "%)"]
    ])
    + group("\ud83c\udfc5", t("statGroupRecords"), [
      ["\ud83d\udcaa", t("statBestHand"), stats.bestHandScore||0],
      ["\ud83d\udc8e", t("statPerfectHands"), (stats.perfectHands||0) + " (" + perfectHandsShare + "%)"],
      ["\u26a1", t("statComeback"), stats.biggestComeback||0],
      ["\ud83d\udc51", t("statBestWinMargin"), stats.bestWinMargin||0]
    ]);
}

    columns: [
      { letterKey: "colLetterP", labelKey: "colPoints", render: function(r){ return r.stats.leaguePoints||0; } },
      { letterKey: "colLetterGP", labelKey: "colGamesPlayed", render: function(r){ return r.stats.gamesPlayed||0; } },
      { letterKey: "colLetterV", labelKey: "colWins", render: function(r){ return r.stats.gamesWon||0; } },
      { letterKey: "colLetterD", labelKey: "colLosses", render: function(r){ return (r.stats.gamesPlayed||0) - (r.stats.gamesWon||0); } },
      { letterKey: "colLetterMPlus", labelKey: "colBidsWon", render: function(r){ return r.stats.bidsSucceeded||0; } },
      { letterKey: "colLetterMMinus", labelKey: "colBidsLost", render: function(r){ return (r.stats.bidsAttempted||0) - (r.stats.bidsSucceeded||0); } },
      { letterKey: "colLetterPV", labelKey: "colPidjouStolen2", render: function(r){ return r.stats.pidjouSteals||0; } },
      { letterKey: "colLetterPP", labelKey: "colPidjouProtected2", render: function(r){ return Math.max(0, (r.stats.pidjouWins||0) - (r.stats.pidjouLost||0)); } },
      { letterKey: "colLetter5D", labelKey: "colLast5Full", render: function(r){ return last5DotsHtml(r.stats.recentResults); } }
    ]
  },
  winPct: {
    labelKey: "catWinPct",
    sort: function(r){ return r.stats.gamesPlayed ? (r.stats.gamesWon||0)/r.stats.gamesPlayed : 0; },
    columns: [
      { letterKey: "colWinPct", labelKey: "colWinPctFull", render: function(r){ var gp=r.stats.gamesPlayed||0; return (gp?Math.round(100*(r.stats.gamesWon||0)/gp):0) + "%"; } },
      { letterKey: "colBidPct", labelKey: "colBidPctFull", render: function(r){ var a=r.stats.bidsAttempted||0; return (a?Math.round(100*(r.stats.bidsSucceeded||0)/a):0) + "%"; } }
    ]
  },
  pidjouPct: {
    labelKey: "catPidjouPct",
    sort: function(r){ var w=r.stats.pidjouWins||0; return w ? (r.stats.pidjouSteals||0)/w : 0; },
    columns: [
      { letterKey: "colStolenPct", labelKey: "colStolenPctFull", render: function(r){ var w=r.stats.pidjouWins||0; return (w?Math.round(100*(r.stats.pidjouSteals||0)/w):0) + "%"; } },
      { letterKey: "colKeptPct", labelKey: "colKeptPctFull", render: function(r){ var w=r.stats.pidjouWins||0; return (w?Math.round(100*Math.max(0,w-(r.stats.pidjouLost||0))/w):0) + "%"; } }
    ]
  }

function last5DotsHtml(results){

  }).join("") + "</span>";
}

  var names = await dbGet("names");
  var reverseKey = {};
  Object.keys(names || {}).forEach(function(key){
    var entry = names[key];
    if (entry && entry.playerId) reverseKey[entry.playerId] = key;
  });
  var rows = [];
  Object.keys(players || {}).forEach(function(id){
    var p = players[id];
    rows.push({
      id: id,
      nameKey: reverseKey[id] || null,
      name: (p && p.name) || "?",
      gamesPlayed: (p && p.stats && p.stats.gamesPlayed) || 0,
      lastSeen: p && p.lastSeen
    });
  });
  rows.sort(function(a,b){ return (b.lastSeen||0) - (a.lastSeen||0); });
  client.adminRows = rows;
  client.adminLoading = false;
  render();
};

window.pjSetDetailsTab = function(tab){ client.detailsTab = tab; render(); };
window.pjDismissTrumpAnnounce = function(){ client.trumpAnnounceDismissed = true; render(); };
window.pjToggleDetails = function(){

function detailsPanelHtml(r){

    { key: "points", label: t("tabPoints") },

    { key: "log", label: t("tabLog") }

function pointDetail(pt){
  if (pt.kind === "card"){
    return pt.card ? (rankOf(pt.card) + SUIT_SYMBOL[suitOf(pt.card)]) : "\u2014";
  }
  if (pt.kind === "jack") return pt.winner ? (rankOf(pt.card) + SUIT_SYMBOL[suitOf(pt.card)]) : t("notDealt");
  if (pt.kind === "pidjou") return pt.winner ? (rankOf(pt.card) + SUIT_SYMBOL[suitOf(pt.card)]) : t("notDealt");
  if (pt.kind === "game") return pt.tie ? t("gameTieDetail", {n: pt.total}) : t("cardPointsSuffix", {n: pt.total});
  return "";
}
function livePointDetail(pt){
  if (pt.kind === "card") return pt.card ? (rankOf(pt.card) + SUIT_SYMBOL[suitOf(pt.card)]) : t("liveNotYet");
  if (pt.kind === "jack") return pt.winner ? (rankOf(pt.card) + SUIT_SYMBOL[suitOf(pt.card)]) : t("liveNotYet");
  if (pt.kind === "pidjou") return pt.winner ? (rankOf(pt.card) + SUIT_SYMBOL[suitOf(pt.card)]) : t("liveNotYet");
  if (pt.kind === "game"){
    if (pt.winner) return t("cardPointsSuffix", {n: pt.total});
    if (pt.tie && pt.total > 0) return t("liveGameTie", {n: pt.total});
    return t("liveNotYet");
  }
  return "";
}
function pointLabel(pt){
  return pt.label + (pt.value > 1 ? (" (" + pt.value + ")") : "");
}
function logLine(entry){
  return t(entry.key, entry.params);
}
function renderTable(){
  var r = client.room;
  renderTopbarRoom();
  ensureOtherPhotosLoaded(r);
  var app = document.getElementById("pj-app");
  var n = r.players.length;
  var dealer = r.players[r.dealerIndex];

  var chips = r.players.map(function(p){
    var cls = ["pj-player-chip"];
    if (p === client.myName) cls.push("is-me");
    var turnPlayer = null;
    if (r.phase === "bidding") turnPlayer = r.bidding.order[r.bidding.turnPtr];
    if (r.phase === "chooseTrump") turnPlayer = r.pitcher;
    if (r.phase === "playing") turnPlayer = r.players[r.turnIndex];
    if (turnPlayer === p) cls.push("is-turn");
    var cardCount = r.hands[p] ? r.hands[p].length : 0;
    var tag = "";
    if (p === dealer) tag = '<span class="tag">' + esc(t("dealerTag")) + "</span>";
    if (p === r.pitcher) tag = '<span class="tag">' + esc(t("pitcherTag")) + "</span>";
    var meta = cardsLabel(cardCount);
    if (r.phase === "bidding"){
      var bid = r.bidding.bids[p];
      meta = bid === undefined ? t("waitingWord") : (bid === "pass" ? t("passWord") : t("bidWord",{n:bid}));
    } else if (p === r.pitcher && r.bidding && r.bidding.highest){
      meta = t("bidWord",{n:r.bidding.highest.amount}) + " \u00b7 " + cardsLabel(cardCount);
    }
    var scoreChangedForP = client.lastScores && client.lastScores[p] !== r.scores[p];
    var chipAvatar = (r.bots && r.bots[p]) ? "\ud83e\udd16" : (p === client.myName ? myAvatarInnerHtml() : otherAvatarInnerHtml(p, r));

  }).join("");
  var newLastScores = {};
  r.players.forEach(function(p){ newLastScores[p] = r.scores[p]; });
  client.lastScores = newLastScores;

  var trumpCorner = "";

    trumpCorner = r.trump

  }

  var feltInner = "";
  if (r.phase === "bidding"){
    var turnPlayer2 = r.bidding.order[r.bidding.turnPtr];
    var mine = turnPlayer2 === client.myName;
    feltInner = '<div class="pj-status-line ' + (mine?"mine":"") + '">' + esc(mine ? t("yourTurnBid") : t("thinkingBid",{player:turnPlayer2})) + "</div>";
  } else if (r.phase === "chooseTrump"){
    var mineT = r.pitcher === client.myName;
    feltInner = '<div class="pj-status-line ' + (mineT?"mine":"") + '">' + esc(mineT ? t("yourTurnTrump") : t("thinkingTrump",{player:r.pitcher})) + "</div>";
  } else if (r.phase === "playing"){
    var trickCards = r.currentTrick.map(function(c){ return '<div class="pj-trick-card"><div class="who">' + esc(c.player) + "</div>" + cardEl(c.card,{mini:true}) + "</div>"; }).join("");
    var turnPlayer3 = r.players[r.turnIndex];
    var mine2 = turnPlayer3 === client.myName;
    var statusLine = '<div class="pj-status-line ' + (mine2?"mine":"") + '">' + esc(mine2 ? t("yourTurnPlay") : t("playingNow",{player:turnPlayer3})) + "</div>";

    // Announce the freshly-chosen trump + exchange summary to everyone, right as play begins.

    // The recap stays up for its guaranteed window even if the next trick has already started

    if (showRecap){
      var reasonKey = r.lastTrick.wonByTrump ? "wonByTrump" : "wonByLedSuit";

      var lastTrickCards = r.lastTrick.cards.map(function(c){

    r.players.forEach(function(p){ if (s0.deltas[p] > s0.deltas[bestPlayer0]) bestPlayer0 = p; });
    var bestDelta0 = s0.deltas[bestPlayer0];
    var bestSign0 = bestDelta0 > 0 ? ("+" + bestDelta0) : String(bestDelta0);
    var tiedCount0 = r.players.filter(function(p){ return s0.deltas[p] === bestDelta0; }).length;

      + (tiedCount0 > 1
          ? esc(t("handTieHeadline", {n: bestSign0}))

function playBeep(){
  try {
    var Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    var ctx = new Ctx();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.35);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.4);
    setTimeout(function(){ try { ctx.close(); } catch(e){} }, 500);
  } catch(e){}
}
function playMelody(notes){
  try {
    var Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    var ctx = new Ctx();
    var maxEnd = 0;
    notes.forEach(function(n){
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = n.freq;
      var t0 = ctx.currentTime + (n.at || 0);
      var dur = n.dur || 0.3;
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(0.16, t0 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t0); osc.stop(t0 + dur + 0.05);
      maxEnd = Math.max(maxEnd, (n.at || 0) + dur);
    });
    setTimeout(function(){ try { ctx.close(); } catch(e){} }, (maxEnd + 0.5) * 1000);
  } catch(e){}
}

      window.pjSaveMyPhoto(dataUrl);
    };
    img.onerror = function(){ showToast(t("photoInvalidType")); };

        ? '<p style="color:var(--text-dim);font-size:14px;margin-top:10px;">' + esc(t("noStatsYet")) + "</p>"
        : (statCategoriesHtml(stats)
          + '<div class="pj-divider-word">' + esc(t("badgesTitle")) + "</div>"
          + (badges.length
              ? '<div style="display:flex;flex-wrap:wrap;gap:6px;">' + badges.map(function(b){
                  return '<span class="pj-bot-tag" style="cursor:pointer;" onclick="pjShowBadgeInfo(\'' + b + '\')">' + esc(t(b)) + "</span>";
                }).join("") + "</div>"
              : '<p style="color:var(--text-dim);font-size:13px;">' + esc(t("noBadgesYet")) + "</p>")))
    + '<div class="pj-divider-word">' + esc(t("accountManageTitle")) + "</div>"
    + '<button class="btn-ghost" style="width:100%;margin-bottom:8px;" onclick="pjChangeUsername()">' + esc(t("changeUsernameBtn")) + "</button>"
    + '<button class="btn-ghost" style="width:100%;margin-bottom:8px;" onclick="pjChangePin()">' + esc(t("changePinBtn")) + "</button>"
    + '<button class="btn-ghost" style="width:100%;margin-bottom:8px;" onclick="pjSignOut()">' + esc(t("signOutBtn")) + "</button>"
    + '<button class="btn-ghost" style="width:100%;color:var(--rust);border-color:var(--rust);" onclick="pjDeleteAccount()">' + esc(t("deleteAccountBtn")) + "</button>"
    + (isAdmin() ? ('<button class="btn-ghost" style="width:100%;margin-top:8px;" onclick="pjCloseProfileOverlay(); pjShowAdmin();">\ud83d\udee0\ufe0f ' + esc(t("adminBtn")) + "</button>") : "");
  var panel = host.querySelector(".pj-panel");
  if (panel) panel.innerHTML = body;
};
window.pjChangePin = async function(){
  var name = client.myName || client.homeNameDraft;
  var key = nameKey(name);
  var entry = await dbGet("names/" + key);
  if (!entry){ showToast(t("toastPinChangeError")); return; }
  var current = window.prompt(t("changePinCurrentPrompt"));
  if (current === null) return;
  if (current.trim() !== entry.pin){ showToast(t("toastPinWrong")); return; }
  var next = window.prompt(t("changePinNewPrompt"));
  if (next === null) return;
  next = next.trim();
  if (!/^\d{4}$/.test(next)){ showToast(t("pinInvalidFormat")); return; }
  entry.pin = next;
  var ok = await dbPut("names/" + key, entry);
  if (!ok){ showToast(t("toastWriteFailed")); return; }
  showToast(t("toastPinChanged"));
};
window.pjChangeUsername = async function(){
  var oldName = client.myName || client.homeNameDraft;
  var oldKey = nameKey(oldName);
  var oldEntry = await dbGet("names/" + oldKey);
  if (!oldEntry){ showToast(t("toastPinChangeError")); return; }
  var pin = window.prompt(t("changePinCurrentPrompt"));
  if (pin === null) return;
  if (pin.trim() !== oldEntry.pin){ showToast(t("toastPinWrong")); return; }
  var newName = window.prompt(t("changeUsernamePrompt"));
  if (newName === null) return;
  newName = newName.trim();
  if (!newName){ showToast(t("toastEnterName")); return; }
  var newKey = nameKey(newName);
  if (newKey !== oldKey){
    var clash = await dbGet("names/" + newKey);
    if (clash && clash.playerId !== client.myId){ showToast(t("toastNameTakenInTable", {name: newName + " (2)"})); return; }
    var ok1 = await dbPut("names/" + newKey, oldEntry);
    var ok2 = await dbPut("names/" + oldKey, null);
    if (!ok1 || !ok2){ showToast(t("toastWriteFailed")); return; }
  }
  try { localStorage.setItem(PLAYER_NAME_KEY, newName); } catch(e){}
  client.homeNameDraft = newName;
  if (client.myName) client.myName = newName;
  showToast(t("toastUsernameChanged"));
  render();
};
window.pjSignOut = function(){
  if (!window.confirm(t("signOutConfirm"))) return;
  try { localStorage.removeItem(PLAYER_NAME_KEY); localStorage.removeItem("pjMyPhoto"); } catch(e){}
  client.isReturningPlayer = false; client.homeNameDraft = ""; client.isGuest = false; client.myPhoto = null;
  client.showAccountGate = true; client.gateMode = null;
  window.pjCloseProfileOverlay();
  render();
};
window.pjDeleteAccount = async function(){
  if (!window.confirm(t("deleteAccountConfirm1"))) return;
  if (!window.confirm(t("deleteAccountConfirm2"))) return;
  var key = nameKey(client.myName || client.homeNameDraft);
  await dbPut("names/" + key, null);
  await dbPut("players/" + client.myId, null);
  try {
    localStorage.removeItem(PLAYER_NAME_KEY);
    localStorage.removeItem(PLAYER_ID_KEY);
    localStorage.removeItem("pjMyPhoto");
  } catch(e){}
  client.myId = getOrCreatePlayerId();
  client.isReturningPlayer = false; client.homeNameDraft = ""; client.isGuest = false; client.myPhoto = null;
  client.showAccountGate = true; client.gateMode = null;
  showToast(t("toastAccountDeleted"));
  window.pjCloseProfileOverlay();
  render();
};
function finishOnboarding(){
  try { localStorage.setItem("pjOnboardingDone", "1"); } catch(e){}
  client.showOnboarding = false;
  render();
}
window.pjOnboardNext = function(){
  if (client.onboardSlide >= ONBOARD_SLIDES.length - 1){ finishOnboarding(); return; }
  client.onboardSlide++;
  render();
};
window.pjTutorialGotIt = function(key){
  markFeatureSeen(key);
  render();
};
window.pjTutorialSkipAll = function(){
  markFeatureSeen("TutBid"); markFeatureSeen("TutTrump"); markFeatureSeen("TutPlay");
  render();
};
window.pjOnboardSkip = function(){ finishOnboarding(); };
function renderOnboarding(){
  var app = document.getElementById("pj-app");
  document.getElementById("pj-tagline").textContent = "";
  document.getElementById("pj-topbar-right").innerHTML = "";
  var slide = ONBOARD_SLIDES[client.onboardSlide];
  var isLast = client.onboardSlide === ONBOARD_SLIDES.length - 1;
  var dots = ONBOARD_SLIDES.map(function(_, i){
    return '<span class="' + (i === client.onboardSlide ? "active" : "") + '"></span>';
  }).join("");
  app.innerHTML =
    '<div class="pj-carousel-overlay">'
      + '<a class="pj-carousel-skip" onclick="pjOnboardSkip()">' + esc(t("onboardSkip")) + "</a>"
      + '<div class="pj-carousel-slide">'
        + '<div class="emoji">' + slide.emoji + "</div>"
        + '<h2>' + esc(t(slide.titleKey)) + "</h2>"
        + '<p>' + esc(t(slide.textKey)) + "</p>"
      + "</div>"
      + '<div class="pj-carousel-dots">' + dots + "</div>"
      + '<div class="pj-carousel-nav"><button class="btn-primary" onclick="pjOnboardNext()">' + esc(isLast ? t("onboardStart") : t("onboardNext")) + "</button></div>"
    + "</div>";
}
window.pjGateChoose = function(mode){ client.gateMode = mode; render(); };
window.pjGateBack = function(){ client.gateMode = null; render(); };
window.pjGateConfirmAccount = async function(){
  var name = (client.homeNameDraft || "").trim();
  var pin = (client.gatePinDraft || "").trim();
  if (!name){ showToast(t("toastEnterName")); return; }
  if (!/^\d{4}$/.test(pin)){ showToast(t("pinInvalidFormat")); return; }
  var key = nameKey(name);
  var entry = await dbGet("names/" + key);
  if (!entry){
    var created = await dbPut("names/" + key, { playerId: client.myId, pin: pin });
    if (!created){ showToast(t("toastWriteFailed")); return; }
  } else if (entry.playerId !== client.myId){
    if (entry.pin !== pin){ showToast(t("toastPinWrong")); return; }
    client.myId = entry.playerId;
    try { localStorage.setItem(PLAYER_ID_KEY, client.myId); } catch(e){}
  }
  try { localStorage.setItem(PLAYER_NAME_KEY, name); } catch(e){}
  client.isReturningPlayer = true; client.isGuest = false; client.showAccountGate = false; client.gateMode = null;
  render();
};
window.pjGateConfirmGuest = function(){
  var name = (client.homeNameDraft || "").trim();
  if (!name){ showToast(t("toastEnterName")); return; }
  client.isGuest = true; client.isReturningPlayer = true; client.showAccountGate = false; client.gateMode = null;
  render();
};
function renderAccountGate(){
  var app = document.getElementById("pj-app");
  document.getElementById("pj-tagline").textContent = "";
  document.getElementById("pj-topbar-right").innerHTML = '<div class="pj-topbar-actions">' + langToggleHtml() + "</div>";
  var mode = client.gateMode;
  var nameFieldHtml = '<label class="pj-field-label">' + esc(t("gateNamePrompt")) + "</label>"
    + '<input type="text" placeholder="' + esc(t("namePlaceholder")) + '" value="' + esc(client.homeNameDraft||"") + '" oninput="pjDraft(\'homeNameDraft\', this.value)" maxlength="12" />'
    + '<div style="height:12px"></div>';
  var content;
  if (mode === "account" || mode === "login"){
    var pinFieldHtml = '<label class="pj-field-label">' + esc(t("gatePinLabel")) + "</label>"
      + '<input type="text" inputmode="numeric" pattern="[0-9]*" placeholder="\u2022\u2022\u2022\u2022" style="letter-spacing:6px;" value="' + esc(client.gatePinDraft||"") + '" oninput="pjDraft(\'gatePinDraft\', this.value)" maxlength="4" />'
      + '<div style="height:14px"></div>';
    content = '<div class="pj-panel">'
      + '<h3 class="disp">' + esc(mode === "login" ? t("gateLoginTitle") : t("gateAccountTitle")) + "</h3>"
      + nameFieldHtml
      + pinFieldHtml
      + '<button class="btn-primary" style="width:100%" onclick="pjGateConfirmAccount()">' + esc(t("gateConfirmBtn")) + "</button>"
      + '<div style="margin-top:10px;text-align:center;"><a onclick="pjGateBack()" style="cursor:pointer;color:var(--text-dim);font-size:13px;">' + esc(t("gateBackLink")) + "</a></div>"
    + "</div>";
  } else if (mode === "guest"){
    content = '<div class="pj-panel">'
      + '<h3 class="disp">' + esc(t("gateGuestTitle")) + "</h3>"
      + '<p style="font-size:13.5px;color:var(--text-dim);line-height:1.5;margin:6px 0 14px;">' + esc(t("gateGuestDesc")) + "</p>"
      + nameFieldHtml
      + '<button class="btn-ghost" style="width:100%" onclick="pjGateConfirmGuest()">' + esc(t("gateConfirmBtn")) + "</button>"
      + '<div style="margin-top:10px;text-align:center;"><a onclick="pjGateBack()" style="cursor:pointer;color:var(--text-dim);font-size:13px;">' + esc(t("gateBackLink")) + "</a></div>"
    + "</div>";
  } else {
    content = '<div class="pj-panel pj-gate-card" onclick="pjGateChoose(\'account\')" style="margin-bottom:12px;text-align:center;">'
        + '<h3 class="disp" style="margin:0;">' + esc(t("gateAccountTitle")) + "</h3>"
      + "</div>"
      + '<div class="pj-panel pj-gate-card" onclick="pjGateChoose(\'login\')" style="margin-bottom:12px;text-align:center;">'
        + '<h3 class="disp" style="margin:0;">' + esc(t("gateLoginTitle")) + "</h3>"
      + "</div>"
      + '<div class="pj-panel pj-gate-card" onclick="pjGateChoose(\'guest\')" style="text-align:center;">'
        + '<h3 class="disp" style="margin:0 0 4px;">' + esc(t("gateGuestTitle")) + "</h3>"
        + '<p style="font-size:12.5px;color:var(--text-dim);margin:0;">' + esc(t("gateGuestDesc")) + "</p>"
      + "</div>";
  }
  app.innerHTML = '<div class="pj-center">'
    + '<div class="pj-card-suit-row" style="text-align:center;">\u2660 \u2665 \u2666 \u2663</div>'
    + '<h2 class="disp" style="text-align:center;color:var(--brass-bright);margin:0 0 14px;">' + esc(t("gateTitle")) + "</h2>"
    + content
  + "</div>";
}
function render(){
  if (!STORAGE_CONFIGURED){
    document.getElementById("pj-topbar-right").innerHTML = "";
    document.getElementById("pj-app").innerHTML =
      '<div class="pj-center"><div class="pj-panel" style="border-color:var(--rust);">'
      + '<h3 class="disp" style="color:var(--rust);">Configuration requise</h3>'
      + '<p style="font-size:14px;line-height:1.6;color:var(--text-light);">Ce fichier n\'est pas encore reli\u00e9 \u00e0 une base de donn\u00e9es. Ouvre le fichier <code>pidjou.html</code>, cherche la ligne <code>FIREBASE_DB_URL</code> tout en haut du script, et remplace-la par ton URL Firebase (voir les instructions fournies).</p>'
      + '</div></div>';
    return;
  }
  if (client.showOnboarding && !client.room){
    renderOnboarding();
    return;
  }
  if (client.showAccountGate && !client.room){
    renderAccountGate();
    return;
  }
  if (client.room && client.room.phase === "gameOver" && client.mode !== "local"){
    var gkey = client.roomCode + ":" + (client.room.gameNumber || 1);
    if (client.statsRecordedKey !== gkey){
      client.statsRecordedKey = gkey;
      recordGameResult(client.room);
    }
  }
  if (!client.room) renderHome();
  else if (client.room.phase === "lobby") renderLobby();
  else renderTable();
  checkTurnAlert();
  maybeAlertAfk();
  maybeDriveBots();
}
window.addEventListener("beforeunload", function(e){
  if (client.room && client.room.phase !== "lobby" && client.room.phase !== "gameOver"){
    e.preventDefault();
    e.returnValue = "";
    return "";
  }
});
startHeartbeat();
startInvitePolling();
render();
if ("serviceWorker" in navigator){
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js").catch(function(){ /* ok if unavailable */ });
  });
}
})();
</script>
</body>
</html>
